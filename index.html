<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Niche CRM - Plateforme de gestion complète pour entreprises modernes" />
  <meta name="author" content="Niche CRM" />
  <title>Niche CRM — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0b0b0e;
      --blue-primary: #2b2fff;
      --blue-hover: #4f5aff;
      --blue-glow: rgba(43, 47, 255, 0.35);
      --surface-card: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf2;
      --text-muted: rgba(237, 237, 242, 0.4);
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1.5rem;
    }

    /* Dot grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* Blur blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 520px;
      height: 520px;
      background: rgba(43, 47, 255, 0.13);
      top: -140px;
      left: -140px;
    }
    .blob-2 {
      width: 380px;
      height: 380px;
      background: rgba(43, 47, 255, 0.08);
      bottom: -80px;
      right: -80px;
    }
    .blob-3 {
      width: 220px;
      height: 220px;
      background: rgba(43, 47, 255, 0.07);
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    /* Login card glassmorphism */
    .login-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: 0 0 90px rgba(43, 47, 255, 0.07), 0 48px 96px rgba(0, 0, 0, 0.55);
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo section */
    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .logo-svg {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .logo-text .name {
      font-size: 19px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .logo-text .sub {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* 5 glassmorphism icons row */
    .icons-row {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      padding: 12px 14px;
      background: rgba(43, 47, 255, 0.06);
      border: 1px solid rgba(43, 47, 255, 0.12);
      border-radius: 12px;
    }
    .icon-pill {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(43, 47, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .icon-pill:hover {
      transform: translateY(-2px);
      background: rgba(43, 47, 255, 0.28);
    }

    /* Typography */
    h1 {
      font-size: 27px;
      font-weight: 600;
      letter-spacing: -0.6px;
      margin-bottom: 5px;
    }
    .tagline {
      color: var(--text-muted);
      font-size: 13.5px;
      margin-bottom: 32px;
    }

    /* Form fields */
    .field {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.042);
      border: 1px solid var(--border-subtle);
      border-radius: 11px;
      padding: 12px 15px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.17);
    }
    input:focus {
      border-color: rgba(43, 47, 255, 0.55);
      box-shadow: 0 0 0 3px rgba(43, 47, 255, 0.1);
    }

    /* Role selector */
    .role-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
      margin-top: 8px;
    }
    .roles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 28px;
    }
    .role {
      padding: 10px 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.17s;
      text-align: center;
    }
    .role:hover {
      border-color: rgba(43, 47, 255, 0.4);
      color: var(--text-primary);
    }
    .role.on {
      background: rgba(43, 47, 255, 0.15);
      border-color: var(--blue-primary);
      color: var(--text-primary);
    }

    /* Sign in button */
    .btn {
      width: 100%;
      padding: 13.5px;
      background: var(--blue-primary);
      border: none;
      border-radius: 11px;
      color: var(--text-primary);
      font-size: 14.5px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 30px var(--blue-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover {
      background: var(--blue-hover);
      box-shadow: 0 0 44px var(--blue-glow);
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
    }
    .arrow {
      font-size: 18px;
      transition: transform 0.2s;
    }
    .btn:hover .arrow {
      transform: translateX(4px);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .footer a {
      color: rgba(120, 130, 255, 0.85);
      text-decoration: none;
    }
    .footer a:hover {
      color: var(--text-primary);
    }

    /* Quick nav panel */
    .quick-preview {
      margin-top: 28px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
    }
    .quick-preview p {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .page-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .page-links a {
      font-size: 11px;
      padding: 5px 10px;
      background: rgba(43, 47, 255, 0.1);
      border: 1px solid rgba(43, 47, 255, 0.2);
      border-radius: 6px;
      color: rgba(120, 130, 255, 0.9);
      text-decoration: none;
      transition: all 0.15s;
    }
    .page-links a:hover {
      background: rgba(43, 47, 255, 0.2);
      color: var(--text-primary);
    }

    /* Responsive */
    @media (max-width: 500px) {
      .login-card {
        padding: 32px 24px;
      }
      .icons-row {
        gap: 6px;
      }
      .icon-pill {
        width: 36px;
        height: 36px;
      }
      .icon-pill svg {
        width: 18px;
        height: 18px;
      }
      h1 {
        font-size: 24px;
      }
      .roles {
        gap: 5px;
      }
      .role {
        padding: 8px 4px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="container">
  <div class="login-card">

    <!-- Logo SVG + Niche text -->
    <div class="logo-section">
      <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="82" cy="22" r="12" fill="#2b2fff"/>
        <rect x="74" y="34" width="4" height="56" rx="2" fill="white"/>
        <text x="80" y="90" font-family="Georgia, serif" font-size="28" font-weight="700" fill="white">che</text>
        <ellipse cx="36" cy="66" rx="28" ry="40" fill="white"/>
        <path d="M22 42 L22 90 L33 90 L33 62 L48 90 L52 90 L52 42 L41 42 L41 68 L27 42 Z" fill="#0b0b0e"/>
      </svg>
      <div class="logo-text">
        <div class="name">Niche</div>
        <div class="sub">CRM Platform</div>
      </div>
    </div>

    <!-- 5 glassmorphism icons row -->
    <div class="icons-row">
      <!-- Folder icon -->
      <div class="icon-pill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 7C3 5.89543 3.89543 5 5 5H10L12 7H19C20.1046 7 21 7.89543 21 9V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V7Z" fill="rgba(43,47,255,0.9)"/>
          <path d="M3 7C3 5.89543 3.89543 5 5 5H10L12 7H19C20.1046 7 21 7.89543 21 9V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V7Z" fill="rgba(130,150,255,0.35)"/>
        </svg>
      </div>
      <!-- User + notification badge -->
      <div class="icon-pill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" fill="rgba(43,47,255,0.9)"/>
          <path d="M4 20C4 17 7.58 15 12 15C16.42 15 20 17 20 20" stroke="rgba(130,150,255,0.7)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="18" cy="6" r="3" fill="rgba(43,47,255,0.9)"/>
        </svg>
      </div>
      <!-- Calendar "31" -->
      <div class="icon-pill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="16" rx="3" fill="rgba(130,150,255,0.35)"/>
          <rect x="3" y="5" width="18" height="7" rx="3" fill="rgba(43,47,255,0.9)"/>
          <text x="12" y="18" font-size="8" font-weight="700" fill="rgba(43,47,255,0.9)" text-anchor="middle" font-family="sans-serif">31</text>
          <line x1="8" y1="3" x2="8" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="3" x2="16" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <!-- Bar chart -->
      <div class="icon-pill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="14" width="4" height="7" rx="1.5" fill="rgba(130,150,255,0.5)"/>
          <rect x="10" y="9" width="4" height="12" rx="1.5" fill="rgba(43,47,255,0.9)"/>
          <rect x="17" y="5" width="4" height="16" rx="1.5" fill="rgba(43,47,255,0.6)"/>
        </svg>
      </div>
      <!-- Lock -->
      <div class="icon-pill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="5" y="11" width="14" height="10" rx="3" fill="rgba(130,150,255,0.35)"/>
          <path d="M8 11V7C8 4.8 9.8 3 12 3C14.2 3 16 4.8 16 7V11" stroke="rgba(43,47,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="12" cy="16" r="1.5" fill="rgba(43,47,255,0.9)"/>
        </svg>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="tagline">Sign in to your workspace</p>

    <!-- Email field -->
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="emailInput" placeholder="you@niche.com" value="demo@niche.com" />
    </div>

    <!-- Password field -->
    <div class="field" style="margin-bottom: 22px;">
      <label>PASSWORD</label>
      <input type="password" id="passwordInput" placeholder="••••••••" value="demo123" />
    </div>

    <!-- Role selector -->
    <span class="role-label">LOGIN AS</span>
    <div class="roles">
      <button class="role on" onclick="pickRole(this)">⚡ Admin</button>
      <button class="role" onclick="pickRole(this)">🎯 Project Manager</button>
      <button class="role" onclick="pickRole(this)">💼 Freelancer</button>
      <button class="role" onclick="pickRole(this)">👤 Client</button>
    </div>

    <!-- Sign in button -->
    <button class="btn" onclick="handleLogin()">
      Sign in <span class="arrow">→</span>
    </button>

    <!-- Footer -->
    <p class="footer">Need access? <a href="#">Contact your admin</a></p>
  </div>

  <!-- Quick navigation panel -->
  <div class="quick-preview">
    <p>All pages</p>
    <div class="page-links">
      <a href="pages/dashboard.html">Dashboard</a>
      <a href="pages/leads.html">Pipeline / Leads</a>
      <a href="pages/cold-callers.html">Cold Callers</a>
      <a href="pages/outreachers.html">Outreachers</a>
      <a href="pages/freelancers.html">Freelancers</a>
      <a href="pages/clients.html">Clients</a>
      <a href="pages/tasks.html">Tasks</a>
      <a href="pages/finance.html">Finance</a>
      <a href="pages/analytics.html">Analytics</a>
    </div>
  </div>
</div>

<script>
  // Role selection handler
  function pickRole(element) {
    document.querySelectorAll('.role').forEach(btn => btn.classList.remove('on'));
    element.classList.add('on');
  }

  // Login handler with navigation based on role
  function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();
    
    // Simple validation
    if (!email || !password) {
      alert('Please enter your email and password');
      return;
    }
    
    // Get selected role text
    const activeRole = document.querySelector('.role.on');
    const roleText = activeRole.textContent.trim().toLowerCase();
    
    console.log(`Login attempt with role: ${roleText}`);
    
    // Navigate based on role
    if (roleText.includes('client')) {
      window.location.href = 'pages/clients.html';
    } else if (roleText.includes('freelancer')) {
      window.location.href = 'pages/freelancers.html';
    } else {
      window.location.href = 'pages/dashboard.html';
    }
  }

  // Enter key support
  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      handleLogin();
    }
  });
  document.getElementById('emailInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      handleLogin();
    }
  });
</script>
</body>
</html>
