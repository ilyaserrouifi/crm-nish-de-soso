<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Niche CRM - Plateforme de gestion complète pour entreprises modernes" />
  <meta name="author" content="Niche CRM" />
  <title>Niche CRM — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0b0b0e;
      --blue-primary: #2b2fff;
      --blue-hover: #4f5aff;
      --blue-glow: rgba(43, 47, 255, 0.35);
      --surface-card: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf2;
      --text-muted: rgba(237, 237, 242, 0.4);
      --error-red: #ef4444;
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1.5rem;
    }

    /* Dot grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* Blur blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 520px;
      height: 520px;
      background: rgba(43, 47, 255, 0.13);
      top: -140px;
      left: -140px;
    }
    .blob-2 {
      width: 380px;
      height: 380px;
      background: rgba(43, 47, 255, 0.08);
      bottom: -80px;
      right: -80px;
    }
    .blob-3 {
      width: 220px;
      height: 220px;
      background: rgba(43, 47, 255, 0.07);
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    /* Login card glassmorphism */
    .login-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: 0 0 90px rgba(43, 47, 255, 0.07), 0 48px 96px rgba(0, 0, 0, 0.55);
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo section */
    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .logo-svg {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .logo-text .name {
      font-size: 19px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .logo-text .sub {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* 5 glassmorphism icons row */
    .icons-row {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      padding: 12px 14px;
      background: rgba(43, 47, 255, 0.06);
      border: 1px solid rgba(43, 47, 255, 0.12);
      border-radius: 12px;
    }
    .icon-pill {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(43, 47, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .icon-pill:hover {
      transform: translateY(-2px);
      background: rgba(43, 47, 255, 0.28);
    }

    /* Typography */
    h1 {
      font-size: 27px;
      font-weight: 600;
      letter-spacing: -0.6px;
      margin-bottom: 5px;
    }
    .tagline {
      color: var(--text-muted);
      font-size: 13.5px;
      margin-bottom: 32px;
    }

    /* Form fields */
    .field {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.042);
      border: 1px solid var(--border-subtle);
      border-radius: 11px;
      padding: 12px 15px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.17);
    }
    input:focus {
      border-color: rgba(43, 47, 255, 0.55);
      box-shadow: 0 0 0 3px rgba(43, 47, 255, 0.1);
    }

    /* Role selector (visual only) */
    .role-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
      margin-top: 8px;
    }
    .roles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 28px;
    }
    .role {
      padding: 10px 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.17s;
      text-align: center;
    }
    .role:hover {
      border-color: rgba(43, 47, 255, 0.4);
      color: var(--text-primary);
    }
    .role.on {
      background: rgba(43, 47, 255, 0.15);
      border-color: var(--blue-primary);
      color: var(--text-primary);
    }

    /* Error message */
    .error-msg {
      color: var(--error-red);
      font-size: 12px;
      margin-bottom: 16px;
      text-align: center;
      min-height: 20px;
      display: none;
    }
    .error-msg.visible {
      display: block;
    }

    /* Sign in button */
    .btn {
      width: 100%;
      padding: 13.5px;
      background: var(--blue-primary);
      border: none;
      border-radius: 11px;
      color: var(--text-primary);
      font-size: 14.5px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 30px var(--blue-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover:not(:disabled) {
      background: var(--blue-hover);
      box-shadow: 0 0 44px var(--blue-glow);
      transform: translateY(-1px);
    }
    .btn:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn:disabled {
      background: rgba(43, 47, 255, 0.5);
      cursor: not-allowed;
      transform: none;
    }
    .arrow {
      font-size: 18px;
      transition: transform 0.2s;
    }
    .btn:hover:not(:disabled) .arrow {
      transform: translateX(4px);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .footer a {
      color: rgba(120, 130, 255, 0.85);
      text-decoration: none;
    }
    .footer a:hover {
      color: var(--text-primary);
    }

    /* Responsive */
    @media (max-width: 500px) {
      .login-card {
        padding: 32px 24px;
      }
      .icons-row {
        gap: 6px;
      }
      .icon-pill {
        width: 36px;
        height: 36px;
      }
      .icon-pill svg {
        width: 18px;
        height: 18px;
      }
      h1 {
        font-size: 24px;
      }
      .roles {
        gap: 5px;
      }
      .role {
        padding: 8px 4px;
        font-size: 11px;
      }
    }
  </style>
</head>

<script>
  // Role selection handler (visual only — role comes from database)
  function pickRole(el) {
    document.querySelectorAll('.role').forEach(btn => btn.classList.remove('on'));
    el.classList.add('on');
  }

  // Real login handler with API call
  async function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('errorMsg');

    // Reset error
    errorEl.textContent = '';
    errorEl.classList.remove('visible');

    // Validation
    if (!email || !password) {
      errorEl.textContent = 'Please enter email and password';
      errorEl.classList.add('visible');
      return;
    }

    // Email format validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      errorEl.textContent = 'Please enter a valid email address';
      errorEl.classList.add('visible');
      return;
    }

    // Show loading state
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      // Real API call to backend
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (!response.ok) {
        // Handle API error
        errorEl.textContent = data.error || data.message || 'Invalid credentials. Please try again.';
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.innerHTML = originalText;
        return;
      }

      // Success — save user to localStorage
      localStorage.setItem('user', JSON.stringify(data));
      const toast = document.getElementById('successToast');
      toast.textContent = '✓ Welcome back, ' + (data.name || data.email) + '!';
      toast.style.display = 'block';
      setTimeout(() => {

      // Redirect based on role from database
      const role = data.role;
      if (role === 'CLIENT') {
        window.location.href = '/pages/dashboard.html';
     } else if (role === 'FREELANCER') {
         window.location.href = '/pages/dashboard.html';
     } else {
         window.location.href = '/pages/dashboard.html';
     }

    } catch (err) {
      // Network or connection error
      console.error('Login error:', err);
      errorEl.textContent = 'Connection error. Please check your network and try again.';
      errorEl.classList.add('visible');
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  }

  // Enter key support
  const passwordInput = document.getElementById('passwordInput');
  const emailInput = document.getElementById('emailInput');

  passwordInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleLogin();
    }
  });

  emailInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleLogin();
    }
  });

  // Demo mode notice (only visible in console for developers)
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    console.log('🔐 Niche CRM Login — Ready for API integration');
    console.log('Expected API endpoint: POST /api/auth/login');
    console.log('Expected response: { id, name, email, role }');
    console.log('Roles: ADMIN, PROJECT_MANAGER, FREELANCER, CLIENT');
  }
</script>
