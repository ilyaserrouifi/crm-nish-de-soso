<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Niche CRM - Gestion des freelances" />
  <meta name="author" content="Niche CRM" />
  <title>Niche CRM — Freelancers</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0b0b0e;
      --blue-primary: #2b2fff;
      --blue-hover: #4f5aff;
      --blue-glow: rgba(43, 47, 255, 0.35);
      --surface-card: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.06);
      --border-subtle: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf2;
      --text-muted: rgba(237, 237, 242, 0.4);
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --purple: #a78bfa;
      --blue-light: #60a5fa;
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: rgba(43, 47, 255, 0.1); top: -150px; left: 200px; }
    .blob-2 { width: 350px; height: 350px; background: rgba(43, 47, 255, 0.06); bottom: -80px; right: 100px; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: rgba(255, 255, 255, 0.025);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 24px;
      cursor: pointer;
    }
    .brand-mark{width:40px;height:40px;border-radius:999px;background:linear-gradient(160deg,#191c26 0%,#0e1018 55%,#171a24 100%);position:relative;display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
    .brand-mark::before{content:'N';font-weight:700;font-size:24px;line-height:1;color:#f4f6ff;font-family:'DM Sans',sans-serif;transform:translateX(-1px)}
    .brand-mark::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;background:#2b2fff;right:-2px;top:-2px;box-shadow:0 0 12px rgba(43,47,255,.8)}
    .logo-text .name{font-size:16px;font-weight:700;letter-spacing:.2px;color:var(--text-primary)}
    .logo-text .name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .logo-text .sub { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

    .nav-section { padding: 0 12px; margin-bottom: 24px; }
    .nav-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 0 12px 8px 12px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: 9px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }
    .nav-item:hover { background: var(--surface-hover); color: var(--text-primary); }
    .nav-item.active { background: rgba(43, 47, 255, 0.15); border: 1px solid rgba(43, 47, 255, 0.25); color: var(--text-primary); }
    .nav-item svg { width: 18px; height: 18px; opacity: 0.7; }
    .logout-btn {
      margin-top: auto;
      margin-bottom: 24px;
      margin-left: 12px;
      margin-right: 12px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 9px;
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: var(--transition);
    }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }

    /* Main Content */
    .main {
      margin-left: 220px;
      flex: 1;
      position: relative;
      z-index: 10;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 0;
      background: var(--bg-deep);
      z-index: 20;
    }
    .topbar-left h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .topbar-left p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .add-btn {
      background: var(--blue-primary);
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      color: white;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 0 20px var(--blue-glow);
      transition: var(--transition);
    }
    .add-btn:hover { background: var(--blue-hover); transform: translateY(-1px); }

    .content { padding: 28px 32px; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 20px 24px;
      transition: var(--transition);
    }
    .stat-card:hover { background: var(--surface-hover); transform: translateY(-2px); }
    .stat-value { font-size: 32px; font-weight: 700; margin-top: 8px; }
    .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    .toolbar input, .toolbar select {
      background: rgba(255, 255, 255, 0.042);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .toolbar input { flex: 1; min-width: 200px; }
    .toolbar input:focus, .toolbar select:focus {
      border-color: rgba(43, 47, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(43, 47, 255, 0.1);
    }

    /* Freelancers Grid */
    .freelancers-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 24px;
    }
    .freelancer-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: var(--transition);
    }
    .freelancer-card:hover {
      background: var(--surface-hover);
      border-color: rgba(43, 47, 255, 0.3);
      transform: translateY(-2px);
    }
    .card-header { display: flex; gap: 14px; margin-bottom: 14px; }
    .avatar-large {
      width: 48px;
      height: 48px;
      background: rgba(43, 47, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--purple);
      flex-shrink: 0;
    }
    .card-meta { flex: 1; }
    .freelancer-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .freelancer-role { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
    }
    .status-available { background: rgba(74, 222, 128, 0.12); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.25); }
    .status-busy { background: rgba(251, 191, 36, 0.12); color: var(--amber); border: 1px solid rgba(251, 191, 36, 0.25); }
    .status-unavailable { background: rgba(248, 113, 113, 0.12); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.25); }
    .card-actions { display: flex; gap: 6px; }
    .card-actions button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      transition: var(--transition);
    }
    .card-actions button:hover { background: rgba(43, 47, 255, 0.2); }
    .card-actions button.danger:hover { background: rgba(248, 113, 113, 0.2); }

    .skills-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .skill-tag {
      background: rgba(43, 47, 255, 0.12);
      border: 1px solid rgba(43, 47, 255, 0.2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 10px;
      color: #818cf8;
    }
    .skill-more { font-size: 10px; color: var(--text-muted); padding: 3px 0; }

    .card-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; padding: 12px 0; border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); }
    .card-stat { text-align: center; }
    .stat-val { font-size: 16px; font-weight: 600; }
    .stat-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

    .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
    .timezone { color: var(--text-muted); }
    .portfolio-link { color: var(--blue-light); text-decoration: none; }
    .portfolio-link:hover { text-decoration: underline; }

    /* Skeleton */
    .skeleton-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 20px;
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      visibility: hidden;
      opacity: 0;
      transition: var(--transition);
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-card {
      background: #13131a;
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 32px;
      width: 500px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-card h2 { margin-bottom: 24px; font-size: 20px; font-weight: 600; }
    .modal-card .form-group { margin-bottom: 16px; }
    .modal-card label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .modal-card input, .modal-card select {
      width: 100%;
      background: rgba(255, 255, 255, 0.042);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
    }
    .modal-card input:focus, .modal-card select:focus {
      border-color: rgba(43, 47, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(43, 47, 255, 0.1);
    }
    .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
    .btn-primary {
      flex: 1;
      background: var(--blue-primary);
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-primary:hover { background: var(--blue-hover); }
    .btn-secondary {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-secondary:hover { background: var(--surface-hover); color: var(--text-primary); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Detail Panel Tabs */
    .detail-panel {
      position: fixed;
      right: -520px;
      top: 0;
      width: 480px;
      height: 100vh;
      background: #13131a;
      border-left: 1px solid var(--border-subtle);
      transition: right 0.3s ease;
      z-index: 200;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.open { right: 0; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .panel-header h2 { font-size: 20px; font-weight: 600; }
    .close-panel {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
    }
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 28px;
    }
    .panel-tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }
    .panel-tab.active { color: var(--blue-primary); border-bottom-color: var(--blue-primary); }
    .panel-content { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .profile-section { margin-bottom: 24px; }
    .avatar-large-panel { width: 64px; height: 64px; background: rgba(43, 47, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: var(--purple); margin-bottom: 16px; }
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
    .info-label { color: var(--text-muted); font-size: 12px; }
    .info-value { font-weight: 500; }

    .task-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .task-name { font-weight: 600; }
    .priority-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; }
    .priority-high { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .priority-medium { background: rgba(251, 191, 36, 0.15); color: var(--amber); }
    .priority-low { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .task-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 16px; margin-bottom: 8px; }
    .task-status {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 10px;
    }
    .status-tag-to-do { background: rgba(96, 165, 250, 0.15); color: var(--blue-light); }
    .status-tag-in-progress { background: rgba(43, 47, 255, 0.15); color: #818cf8; }
    .status-tag-in-review { background: rgba(251, 191, 36, 0.15); color: var(--amber); }
    .status-tag-revision { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .status-tag-done { background: rgba(74, 222, 128, 0.15); color: var(--green); }

    .progress-bar { height: 6px; background: var(--border-subtle); border-radius: 999px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; border-radius: 999px; width: 0%; transition: width 0.5s ease; }
    .stars { font-size: 14px; letter-spacing: 2px; color: var(--amber); }
    .performance-row { margin-bottom: 16px; }
    .score-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .score-a { background: rgba(74, 222, 128, 0.15); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.3); }
    .score-b { background: rgba(96, 165, 250, 0.15); color: var(--blue-light); border: 1px solid rgba(96, 165, 250, 0.3); }
    .score-c { background: rgba(251, 191, 36, 0.15); color: var(--amber); border: 1px solid rgba(251, 191, 36, 0.3); }
    .score-d { background: rgba(248, 113, 113, 0.15); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.3); }

    .error-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--red);
      padding: 12px 20px;
      border-radius: 10px;
      z-index: 999;
      font-size: 13px;
      backdrop-filter: blur(8px);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 1200px) { .freelancers-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; transition: transform 0.3s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr; }
      .freelancers-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .detail-panel { width: 100%; right: -100%; }
    }
  </style>
</head>

    <a href="clients.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke="currentColor" stroke-width="1.8"/></svg>Clients</a>

    <div class="nav-label">WORK</div>
    <a href="tasks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3 5-6" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/></svg>Tasks</a>
    <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 6v12M9 9.5c0-1.1.9-2 2-2h2a2 2 0 010 4h-2a2 2 0 000 4h2a2 2 0 002-2" stroke="currentColor" stroke-width="1.8"/></svg>Finance</a>
    <a href="analytics.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="14" width="4" height="7" rx="1" fill="currentColor"/><rect x="10" y="9" width="4" height="12" rx="1" fill="currentColor"/><rect x="17" y="4" width="4" height="17" rx="1" fill="currentColor"/></svg>Analytics</a>
  </div>
  <button class="logout-btn" onclick="location.href='../index.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l4-4-4-4M12 13h12" stroke="currentColor" stroke-width="2"/></svg>Logout</button>
</aside>

<!-- MAIN CONTENT -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Freelancers</h1><p>Manage your talent pool</p></div>
    <button class="add-btn" onclick="openAddModal()">+ Add Freelancer</button>
  </div>
  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search by name, skill, role..." />
      <select id="statusFilter"><option value="all">All Status</option><option value="available">Available</option><option value="busy">Busy</option><option value="unavailable">Unavailable</option></select>
      <select id="roleFilter"><option value="all">All Roles</option><option value="Design">Design</option><option value="Dev">Dev</option><option value="SEO">SEO</option><option value="Ads">Ads</option><option value="Video">Video</option><option value="Copywriting">Copywriting</option><option value="Other">Other</option></select>
      <select id="sortBy"><option value="rating">Top Rated</option><option value="newest">Newest</option><option value="rate">Highest Rate</option></select>
    </div>
    <div class="freelancers-grid" id="freelancersGrid"></div>
  </div>
</main>

<!-- Add Modal -->
<div id="addModal" class="modal-overlay"><div class="modal-card"><h2>Add New Freelancer</h2><form id="addForm" onsubmit="addFreelancer(event)">
  <div class="form-group"><label>Full Name *</label><input type="text" id="addName" required></div>
  <div class="form-group"><label>Username *</label><input type="text" id="addUsername" required></div>
  <div class="form-group"><label>Phone</label><input type="tel" id="addPhone"></div>
  <div class="form-group"><label>Email *</label><input type="email" id="addEmail" required></div>
  <div class="form-group"><label>Role</label><select id="addRole"><option value="Design">Design</option><option value="Dev">Dev</option><option value="SEO">SEO</option><option value="Ads">Ads</option><option value="Video">Video</option><option value="Copywriting">Copywriting</option><option value="Other">Other</option></select></div>
  <div class="form-group"><label>Skills (comma separated)</label><input type="text" id="addSkills" placeholder="React, Node, Python"></div>
  <div class="form-group"><label>Portfolio URL</label><input type="url" id="addPortfolio"></div>
  <div class="form-group"><label>Rate Type</label><select id="addRateType"><option value="hourly">Hourly</option><option value="project">Project</option></select></div>
  <div class="form-group"><label>Rate ($)</label><input type="number" id="addRate" step="5" value="0"></div>
  <div class="form-group"><label>Timezone</label><input type="text" id="addTimezone" placeholder="GMT+1"></div>
  <div class="form-group"><label>Status</label><select id="addStatus"><option value="available">Available</option><option value="busy">Busy</option><option value="unavailable">Unavailable</option></select></div>
  <div class="modal-buttons"><button type="submit" id="addSubmitBtn" class="btn-primary">Add Freelancer</button><button type="button" class="btn-secondary" onclick="closeModal('addModal')">Cancel</button></div>
</form></div></div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay"><div class="modal-card"><h2>Edit Freelancer</h2><form id="editForm" onsubmit="editFreelancer(event)">
  <input type="hidden" id="editId"><div class="form-group"><label>Full Name *</label><input type="text" id="editName" required></div>
  <div class="form-group"><label>Username *</label><input type="text" id="editUsername" required></div>
  <div class="form-group"><label>Phone</label><input type="tel" id="editPhone"></div>
  <div class="form-group"><label>Email *</label><input type="email" id="editEmail" required></div>
  <div class="form-group"><label>Role</label><select id="editRole"><option value="Design">Design</option><option value="Dev">Dev</option><option value="SEO">SEO</option><option value="Ads">Ads</option><option value="Video">Video</option><option value="Copywriting">Copywriting</option><option value="Other">Other</option></select></div>
  <div class="form-group"><label>Skills</label><input type="text" id="editSkills"></div>
  <div class="form-group"><label>Portfolio URL</label><input type="url" id="editPortfolio"></div>
  <div class="form-group"><label>Rate Type</label><select id="editRateType"><option value="hourly">Hourly</option><option value="project">Project</option></select></div>
  <div class="form-group"><label>Rate ($)</label><input type="number" id="editRate" step="5"></div>
  <div class="form-group"><label>Timezone</label><input type="text" id="editTimezone"></div>
  <div class="form-group"><label>Status</label><select id="editStatus"><option value="available">Available</option><option value="busy">Busy</option><option value="unavailable">Unavailable</option></select></div>
  <div class="modal-buttons"><button type="submit" class="btn-primary">Save Changes</button><button type="button" class="btn-secondary" onclick="closeModal('editModal')">Cancel</button></div>
</form></div></div>

<!-- Detail Panel -->
<div id="detailPanel" class="detail-panel">
  <div class="panel-header"><h2 id="panelName">—</h2><button class="close-panel" onclick="closePanel()">✕</button></div>
  <div class="panel-tabs"><div class="panel-tab active" data-tab="profile">Profile</div><div class="panel-tab" data-tab="tasks">Tasks</div><div class="panel-tab" data-tab="performance">Performance</div></div>
  <div class="panel-content" id="panelContent"></div>
</div>

<script>
  let allFreelancers = [];

  function showError(msg) { const toast = document.createElement('div'); toast.className = 'error-toast'; toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 4000); }
  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function closePanel() { document.getElementById('detailPanel').classList.remove('open'); }

  function showSkeletons() {
    const grid = document.getElementById('freelancersGrid');
    grid.innerHTML = Array(6).fill(`<div class="skeleton-card"><div class="skeleton" style="height:48px; width:48px; border-radius:50%; margin-bottom:12px"></div><div class="skeleton" style="height:16px; margin-bottom:8px"></div><div class="skeleton" style="height:12px; margin-bottom:12px"></div><div class="skeleton" style="height:40px; margin-bottom:12px"></div><div class="skeleton" style="height:20px"></div></div>`).join('');
  }

  function renderStats(freelancers) {
    const total = freelancers.length;
    const available = freelancers.filter(f => f.status === 'available').length;
    const avgRating = freelancers.length ? (freelancers.reduce((s,f) => s + (f.rating||0), 0) / freelancers.length).toFixed(1) : 0;
    const totalProjects = freelancers.reduce((s,f) => s + (f.projectsCompleted||0), 0);
    document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="stat-value" style="color:#60a5fa">${total}</div><div class="stat-label">Total Freelancers</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#4ade80">${available}</div><div class="stat-label">Available Now</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#fbbf24">${avgRating} ★</div><div class="stat-label">Avg Rating</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#a78bfa">${totalProjects}</div><div class="stat-label">Projects Completed</div></div>`;
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  function renderFreelancers(freelancers) {
    const grid = document.getElementById('freelancersGrid');
    if (freelancers.length === 0) { grid.innerHTML = '<div class="empty-state">No freelancers found</div>'; return; }
    grid.innerHTML = freelancers.map(f => `<div class="freelancer-card" onclick="openFreelancer('${f.id}')"><div class="card-header"><div class="avatar-large">${(f.name||'?')[0].toUpperCase()}</div><div class="card-meta"><div class="freelancer-name">${escapeHtml(f.name)}</div><div class="freelancer-role">${f.role || '—'}</div><span class="status-badge status-${f.status}">${f.status}</span></div><div class="card-actions"><button onclick="event.stopPropagation(); openEditModal('${f.id}')">✏️</button><button onclick="event.stopPropagation(); deleteFreelancer('${f.id}')" class="danger">🗑️</button></div></div><div class="skills-row">${(f.skills||[]).slice(0,4).map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}${(f.skills||[]).length > 4 ? `<span class="skill-more">+${f.skills.length-4}</span>` : ''}</div><div class="card-stats"><div class="card-stat"><div class="stat-val">${f.rating ? f.rating.toFixed(1) + ' ★' : '—'}</div><div class="stat-lbl">Rating</div></div><div class="card-stat"><div class="stat-val">${f.projectsCompleted || 0}</div><div class="stat-lbl">Projects</div></div><div class="card-stat"><div class="stat-val">${f.completionRate || 0}%</div><div class="stat-lbl">Completion</div></div><div class="card-stat"><div class="stat-val">$${(f.rate||0).toLocaleString()}${f.rateType === 'hourly' ? '/h' : '/proj'}</div><div class="stat-lbl">Rate</div></div></div><div class="card-footer"><span class="timezone">🌍 ${f.timezone || 'GMT'}</span>${f.portfolioUrl ? `<a href="${escapeHtml(f.portfolioUrl)}" target="_blank" onclick="event.stopPropagation()" class="portfolio-link">Portfolio →</a>` : ''}</div></div>`).join('');
  }

  function filterFreelancers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const role = document.getElementById('roleFilter').value;
    const sort = document.getElementById('sortBy').value;
    let filtered = allFreelancers.filter(f => (f.name || '').toLowerCase().includes(q) || (f.skills||[]).some(s => s.toLowerCase().includes(q)) || (f.role||'').toLowerCase().includes(q));
    if (status !== 'all') filtered = filtered.filter(f => f.status === status);
    if (role !== 'all') filtered = filtered.filter(f => f.role === role);
    if (sort === 'rating') filtered.sort((a,b) => (b.rating||0) - (a.rating||0));
    else if (sort === 'rate') filtered.sort((a,b) => (b.rate||0) - (a.rate||0));
    else filtered.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    renderFreelancers(filtered);
  }

  async function loadFreelancers() {
    showSkeletons();
    try {
      const res = await fetch('/api/freelancers');
      if (!res.ok) throw new Error('Failed to load freelancers');
      allFreelancers = await res.json();
      renderStats(allFreelancers);
      filterFreelancers();
    } catch(e) { showError('Failed to load freelancers'); console.error(e); }
  }

  async function addFreelancer(e) {
    e.preventDefault();
    const btn = document.getElementById('addSubmitBtn');
    btn.disabled = true; btn.textContent = 'Saving...';
    const skills = document.getElementById('addSkills').value.split(',').map(s => s.trim()).filter(s => s);
    const body = { name: document.getElementById('addName').value, username: document.getElementById('addUsername').value, phone: document.getElementById('addPhone').value, email: document.getElementById('addEmail').value, role: document.getElementById('addRole').value, skills, portfolioUrl: document.getElementById('addPortfolio').value, rateType: document.getElementById('addRateType').value, rate: parseFloat(document.getElementById('addRate').value) || 0, timezone: document.getElementById('addTimezone').value, status: document.getElementById('addStatus').value };
    try {
      const res = await fetch('/api/freelancers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error('Failed');
      closeModal('addModal'); loadFreelancers();
    } catch(e) { alert('Error saving freelancer'); }
    finally { btn.disabled = false; btn.textContent = 'Add Freelancer'; }
  }

  async function openEditModal(id) {
    const f = allFreelancers.find(c => c.id === id);
    if (!f) return;
    document.getElementById('editId').value = f.id;
    document.getElementById('editName').value = f.name || ''; document.getElementById('editUsername').value = f.username || ''; document.getElementById('editPhone').value = f.phone || ''; document.getElementById('editEmail').value = f.email || '';
    document.getElementById('editRole').value = f.role || 'Design';
    document.getElementById('editSkills').value = (f.skills || []).join(', ');
    document.getElementById('editPortfolio').value = f.portfolioUrl || '';
    document.getElementById('editRateType').value = f.rateType || 'hourly';
    document.getElementById('editRate').value = f.rate || 0;
    document.getElementById('editTimezone').value = f.timezone || '';
    document.getElementById('editStatus').value = f.status || 'available';
    openModal('editModal');
  }

  async function editFreelancer(e) {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const skills = document.getElementById('editSkills').value.split(',').map(s => s.trim()).filter(s => s);
    const body = { name: document.getElementById('editName').value, username: document.getElementById('editUsername').value, phone: document.getElementById('editPhone').value, email: document.getElementById('editEmail').value, role: document.getElementById('editRole').value, skills, portfolioUrl: document.getElementById('editPortfolio').value, rateType: document.getElementById('editRateType').value, rate: parseFloat(document.getElementById('editRate').value) || 0, timezone: document.getElementById('editTimezone').value, status: document.getElementById('editStatus').value };
    try {
      const res = await fetch(`/api/freelancers/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error('Failed');
      closeModal('editModal'); loadFreelancers();
    } catch(e) { alert('Error updating freelancer'); }
  }

  async function deleteFreelancer(id) {
    if (!confirm('Delete this freelancer? This cannot be undone.')) return;
    try {
      const res = await fetch(`/api/freelancers/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Failed');
      loadFreelancers();
    } catch(e) { alert('Failed to delete freelancer'); }
  }

  async function openFreelancer(id) {
    const panel = document.getElementById('detailPanel');
    panel.classList.add('open');
    try {
      const [freelancer, tasks] = await Promise.all([fetch(`/api/freelancers/${id}`).then(r => r.json()), fetch(`/api/freelancers/${id}/tasks`).then(r => r.json())]);
      document.getElementById('panelName').textContent = freelancer.name || '—';
      window.currentFreelancer = freelancer;
      window.currentTasks = tasks || [];
      renderPanelTab('profile');
    } catch(e) { showError('Failed to load freelancer details'); }
  }

  function renderPanelTab(tab) {
    const f = window.currentFreelancer;
    const tasks = window.currentTasks || [];
    const content = document.getElementById('panelContent');
    if (tab === 'profile') {
      const stars = '★'.repeat(Math.floor(f.rating||0)) + '☆'.repeat(5 - Math.floor(f.rating||0));
      content.innerHTML = `<div class="profile-section"><div class="avatar-large-panel">${(f.name||'?')[0].toUpperCase()}</div><div class="info-row"><span class="info-label">Name</span><span class="info-value">${escapeHtml(f.name)}</span></div><div class="info-row"><span class="info-label">Username</span><span class="info-value">@${escapeHtml(f.username)}</span></div><div class="info-row"><span class="info-label">Role</span><span class="info-value">${f.role || '—'}</span></div><div class="info-row"><span class="info-label">Status</span><span class="status-badge status-${f.status}">${f.status}</span></div><div class="info-row"><span class="info-label">Phone</span><span class="info-value">${escapeHtml(f.phone) || '—'}</span></div><div class="info-row"><span class="info-label">Email</span><span class="info-value">${escapeHtml(f.email)}</span></div><div class="info-row"><span class="info-label">Skills</span><span class="info-value">${(f.skills||[]).map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('') || '—'}</span></div><div class="info-row"><span class="info-label">Portfolio</span><span class="info-value">${f.portfolioUrl ? `<a href="${escapeHtml(f.portfolioUrl)}" target="_blank" class="portfolio-link">View →</a>` : '—'}</span></div><div class="info-row"><span class="info-label">Rate</span><span class="info-value">$${(f.rate||0).toLocaleString()}${f.rateType === 'hourly' ? '/hour' : '/project'}</span></div><div class="info-row"><span class="info-label">Timezone</span><span class="info-value">${f.timezone || 'GMT'}</span></div><div class="info-row"><span class="info-label">Member since</span><span class="info-value">${f.createdAt ? new Date(f.createdAt).toLocaleDateString() : '—'}</span></div></div>`;
    } else if (tab === 'tasks') {
      content.innerHTML = tasks.length === 0 ? '<div class="empty-state">No tasks assigned</div>' : tasks.map(t => `<div class="task-card"><div class="task-header"><span class="task-name">${escapeHtml(t.name)}</span><span class="priority-badge priority-${(t.priority||'medium').toLowerCase()}">${t.priority || 'Medium'}</span></div><div class="task-meta"><span>Client: ${escapeHtml(t.clientName)}</span><span>Due: ${t.deadline ? new Date(t.deadline).toLocaleDateString() : '—'}</span></div><span class="task-status status-tag-${(t.status||'to-do').toLowerCase().replace(/ /g,'-')}">${t.status || 'To Do'}</span></div>`).join('');
    } else if (tab === 'performance') {
      const score = (f.rating || 0) >= 4.5 ? 'A' : (f.rating || 0) >= 3.5 ? 'B' : (f.rating || 0) >= 2.5 ? 'C' : 'D';
      const scoreMsg = { A: '🏆 Bonus Eligible', B: '✅ Standard', C: '⚠️ Warning', D: '🚨 PIP — At Risk' };
      content.innerHTML = `<div class="performance-row"><div class="info-row"><span class="info-label">Rating</span><span class="info-value"><span class="stars">${'★'.repeat(Math.floor(f.rating||0))}${'☆'.repeat(5-Math.floor(f.rating||0))}</span> (${(f.rating||0).toFixed(1)} / 5)</span></div></div>
        <div class="performance-row"><div class="info-label">Completion Rate</div><div class="progress-bar"><div class="progress-fill" style="width:${f.completionRate||0}%;background:#4ade80"></div></div><div class="info-value" style="margin-top:4px">${f.completionRate||0}%</div></div>
        <div class="performance-row"><div class="info-label">Satisfaction Rate</div><div class="progress-bar"><div class="progress-fill" style="width:${f.satisfactionRate||0}%;background:#60a5fa"></div></div><div class="info-value" style="margin-top:4px">${f.satisfactionRate||0}%</div></div>
        <div class="info-row"><span class="info-label">Revision Requests</span><span class="info-value">${f.revisionRequests || 0}</span></div>
        <div class="info-row"><span class="info-label">Projects Completed</span><span class="info-value">${f.projectsCompleted || 0}</span></div>
        <div class="performance-row"><div class="info-label">Performance Score</div><div><span class="score-badge score-${score.toLowerCase()}">${scoreMsg[score]}</span></div></div>`;
    }
  }

  document.getElementById('searchInput').addEventListener('input', filterFreelancers);
  document.getElementById('statusFilter').addEventListener('change', filterFreelancers);
  document.getElementById('roleFilter').addEventListener('change', filterFreelancers);
  document.getElementById('sortBy').addEventListener('change', filterFreelancers);

  window.openAddModal = () => openModal('addModal');
  window.closeModal = closeModal;
  window.openEditModal = openEditModal;
  window.deleteFreelancer = deleteFreelancer;
  window.openFreelancer = openFreelancer;
  window.closePanel = closePanel;
  window.addFreelancer = addFreelancer;
  window.editFreelancer = editFreelancer;

  document.querySelectorAll('.panel-tab').forEach(tab => {
    tab.addEventListener('click', () => { document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); renderPanelTab(tab.dataset.tab); });
  });
  loadFreelancers();
</script>
</body>
</html>
