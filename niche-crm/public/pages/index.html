<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Niche CRM — Connexion</title>
  <style>
    :root{--bg:#f7f8fc;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--primary:#2b2fff;--danger:#dc2626}
    *{box-sizing:border-box} body{margin:0;font-family:DM Sans,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
    h1{margin:0 0 6px;font-size:28px}.muted{margin:0 0 18px;color:var(--muted)}
    label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:12px 0 6px}
    input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
    input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(43,47,255,.15)}
    .btn{margin-top:18px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}
    .msg{min-height:20px;margin-top:10px;color:var(--danger);font-size:13px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Connexion</h1>
    <p class="muted">Niche CRM Platform</p>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="admin@niche.com" value="admin@niche.com" />

    <label for="password">Mot de passe</label>
    <input id="password" type="password" placeholder="••••••••" value="admin123" />

    <button id="loginBtn" class="btn">Se connecter</button>
    <p id="msg" class="msg"></p>
  </main>

  <script>
    const msg = document.getElementById('msg');
    const roleRouteMap = {
      ADMIN: '/pages/dashboard.html',
      FINANCE: '/pages/finance.html',
      PROJECT_MANAGER: '/pages/projects.html',
      CLIENT: '/pages/clients.html',
      FREELANCER: '/pages/tasks.html'
    };

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('loginBtn').addEventListener('click', login);

    async function login() {
      msg.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { msg.textContent = 'Email et mot de passe sont obligatoires.'; return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (!response.ok) {
          msg.textContent = data.error || 'Connexion échouée.';
          return;
        }

        localStorage.setItem('crm_user', JSON.stringify(data));
        const role = String(data.role || '').toUpperCase();
        window.location.href = roleRouteMap[role] || '/pages/dashboard.html';
      } catch {
        msg.textContent = 'Erreur réseau. Réessayez.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
