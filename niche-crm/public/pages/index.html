<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Niche CRM - Tableau de bord professionnel" />
  <meta name="author" content="Niche CRM" />
  <title>Niche CRM — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0b0b0e;
      --blue-primary: #2b2fff;
      --blue-hover: #4f5aff;
      --blue-glow: rgba(43, 47, 255, 0.35);
      --surface-card: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.06);
      --border-subtle: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf2;
      --text-muted: rgba(237, 237, 242, 0.4);
      --error-red: #ef4444;
      --green: #4ade80;
      --amber: #fbbf24;
      --purple: #a78bfa;
      --red: #f87171;
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      position: relative;
    }

    /* Background effects */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 500px;
      height: 500px;
      background: rgba(43, 47, 255, 0.1);
      top: -150px;
      left: 200px;
    }
    .blob-2 {
      width: 350px;
      height: 350px;
      background: rgba(43, 47, 255, 0.06);
      bottom: -80px;
      right: 100px;
    }

    /* ============================================ */
    /* SIDEBAR                                      */
    /* ============================================ */
    .sidebar {
      width: 220px;
      background: rgba(255, 255, 255, 0.025);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 24px;
      cursor: pointer;
    }
    .brand-mark{width:40px;height:40px;border-radius:999px;background:linear-gradient(160deg,#191c26 0%,#0e1018 55%,#171a24 100%);position:relative;display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
    .brand-mark::before{content:'N';font-weight:700;font-size:24px;line-height:1;color:#f4f6ff;font-family:'DM Sans',sans-serif;transform:translateX(-1px)}
    .brand-mark::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;background:#2b2fff;right:-2px;top:-2px;box-shadow:0 0 12px rgba(43,47,255,.8)}
    .logo-text .name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .logo-text .sub {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .nav-section {
      padding: 0 12px;
      margin-bottom: 24px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 0 12px 8px 12px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: 9px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }
    .nav-item:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: rgba(43, 47, 255, 0.15);
      border: 1px solid rgba(43, 47, 255, 0.25);
      color: var(--text-primary);
    }
    .nav-item svg {
      width: 18px;
      height: 18px;
      opacity: 0.7;
    }

    .logout-btn {
      margin-top: auto;
      margin-bottom: 24px;
      margin-left: 12px;
      margin-right: 12px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 9px;
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: var(--transition);
    }
    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* ============================================ */
    /* MAIN CONTENT                                 */
    /* ============================================ */
    .main {
      margin-left: 220px;
      flex: 1;
      position: relative;
      z-index: 10;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 0;
      background: var(--bg-deep);
      z-index: 20;
    }
    .topbar-left h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .topbar-left p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--green);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .admin-avatar {
      width: 40px;
      height: 40px;
      background: var(--blue-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
      color: white;
    }

    /* Scrollable content */
    .dashboard-content {
      padding: 28px 32px;
      overflow-y: auto;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(239, 68, 68, 0.95);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 200;
      display: none;
      backdrop-filter: blur(8px);
    }
    .toast.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 20px 24px;
      transition: var(--transition);
    }
    .stat-card:hover {
      background: var(--surface-hover);
      transform: translateY(-2px);
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-top: 12px;
    }
    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Pipeline scroll */
    .pipeline-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 32px;
    }
    .pipeline-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .pipeline-scroll::-webkit-scrollbar-track {
      background: var(--border-subtle);
      border-radius: 4px;
    }
    .pipeline-scroll::-webkit-scrollbar-thumb {
      background: var(--blue-primary);
      border-radius: 4px;
    }
    .stage-card {
      min-width: 140px;
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .stage-card.won {
      border-color: rgba(74, 222, 128, 0.3);
    }
    .stage-card.lost {
      border-color: rgba(248, 113, 113, 0.3);
    }
    .stage-name {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stage-count {
      font-size: 28px;
      font-weight: 700;
    }

    /* Two columns layout */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 20px 24px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .finance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .finance-row:last-child {
      border-bottom: none;
    }
    .finance-label {
      font-size: 13px;
      color: var(--text-muted);
    }
    .finance-value {
      font-size: 18px;
      font-weight: 600;
    }
    .finance-value.green { color: var(--green); }
    .finance-value.red { color: var(--red); }
    .finance-value.amber { color: var(--amber); }

    .lead-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .lead-row:last-child {
      border-bottom: none;
    }
    .company {
      font-weight: 500;
    }
    .stage-badge {
      font-size: 11px;
      padding: 4px 8px;
      background: rgba(43, 47, 255, 0.15);
      border-radius: 20px;
      color: var(--blue-primary);
    }
    .deal {
      font-weight: 500;
      color: var(--green);
    }

    .member-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .member-row:last-child {
      border-bottom: none;
    }
    .score {
      font-weight: 600;
      color: var(--blue-primary);
    }

    .alert-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .alert-row:last-child {
      border-bottom: none;
    }
    .alert-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .empty {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 13px;
    }

    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; transition: transform 0.3s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<main class="main">

      <h1>Dashboard</h1>
      <p id="currentDate"></p>
    </div>
    <div class="topbar-right">

      <div class="admin-avatar">A</div>

  <div class="dashboard-content">
    <!-- Stats Cards Grid (4 cards) -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="skeleton" style="height:32px; width:60px"></div><div class="stat-label">Total Leads</div></div>
      <div class="stat-card"><div class="skeleton" style="height:32px; width:60px"></div><div class="stat-label">Active Clients</div></div>
      <div class="stat-card"><div class="skeleton" style="height:32px; width:60px"></div><div class="stat-label">Active Tasks</div></div>
      <div class="stat-card"><div class="skeleton" style="height:32px; width:80px"></div><div class="stat-label">Revenue</div></div>
    </div>

    <!-- Pipeline Stages (horizontal scroll) -->
    <div class="pipeline-scroll" id="pipelineContainer"></div>

    <!-- Two columns: Finance + Recent Leads -->

        <div class="card-title">💰 FINANCE SNAPSHOT</div>
        <div id="financeContainer"></div>
      </div>

        <div class="card-title">📋 RECENT LEADS</div>
        <div id="recentLeadsContainer"></div>
      </div>

      <div class="card">
        <div class="card-title">🏆 TEAM LEADERBOARD</div>
        <div id="leaderboardContainer"></div>
      </div>
      <div class="card">
        <div class="card-title">🔔 ACTIVE ALERTS</div>
        <div id="alertsContainer"></div>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
  // Display current date
  function updateDate() {
    const dateEl = document.getElementById('currentDate');
    if (dateEl) {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      dateEl.textContent = new Date().toLocaleDateString('en-US', options);
    }
  }

  // Show toast error
  function showError(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 5000);
  }

  // Skeleton state for containers
  function showSkeleton() {
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="skeleton" style="height:32px; width:60px"></div><div class="stat-label">Total Leads</div></div>
      <div class="stat-card"><div class="skeleton" style="height:32px; width:60px"></div><div class="stat-label">Active Clients</div></div>
      <div class="stat-card"><div class="skeleton" style="height:32px; width:60px"></div><div class="stat-label">Active Tasks</div></div>
      <div class="stat-card"><div class="skeleton" style="height:32px; width:80px"></div><div class="stat-label">Revenue</div></div>
    `;
    document.getElementById('pipelineContainer').innerHTML = '<div class="skeleton" style="height:80px; width:100%; margin-bottom:20px"></div>';
    document.getElementById('financeContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
    document.getElementById('recentLeadsContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
    document.getElementById('leaderboardContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
    document.getElementById('alertsContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
  }

  // Stage mapping
  const STAGES = ['LEAD', 'CONTACTED', 'MEETING_BOOKED', 'QUALIFIED', 'PROPOSAL_SENT', 'NEGOTIATING', 'CLOSED_WON', 'CLOSED_LOST'];
  const STAGE_LABELS = {
    LEAD: 'Lead', CONTACTED: 'Contacted', MEETING_BOOKED: 'Meeting',
    QUALIFIED: 'Qualified', PROPOSAL_SENT: 'Proposal',
    NEGOTIATING: 'Negotiating', CLOSED_WON: 'Won ✅', CLOSED_LOST: 'Lost ❌'
  };

  // Render functions
  function renderStats(data) {
    const colors = { totalLeads: '#60a5fa', totalClients: '#a78bfa', activeTasks: '#4ade80', totalRevenue: '#fbbf24' };
    const icons = { totalLeads: '📊', totalClients: '🏢', activeTasks: '✓', totalRevenue: '💰' };
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-value" style="color:${colors.totalLeads}">${data.totalLeads ?? 0}</div><div class="stat-label">📊 Total Leads</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${colors.totalClients}">${data.totalClients ?? 0}</div><div class="stat-label">🏢 Active Clients</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${colors.activeTasks}">${data.activeTasks ?? 0}</div><div class="stat-label">✓ Active Tasks</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${colors.totalRevenue}">$${(data.totalRevenue ?? 0).toLocaleString()}</div><div class="stat-label">💰 Revenue</div></div>
    `;
  }

  function renderPipeline(stageStats) {
    const statsMap = {};
    if (stageStats && Array.isArray(stageStats)) {
      stageStats.forEach(s => { statsMap[s.stage] = s._count; });
    }
    const container = document.getElementById('pipelineContainer');
    container.innerHTML = STAGES.map(stage => {
      const count = statsMap[stage] ?? 0;
      let extraClass = '';
      if (stage === 'CLOSED_WON') extraClass = 'won';
      if (stage === 'CLOSED_LOST') extraClass = 'lost';
      return `<div class="stage-card ${extraClass}">
        <div class="stage-name">${STAGE_LABELS[stage]}</div>
        <div class="stage-count">${count}</div>
      </div>`;
    }).join('');
  }

  function renderFinance(data) {
    document.getElementById('financeContainer').innerHTML = `
      <div class="finance-row"><span class="finance-label">MRR</span><span class="finance-value green">$${(data.mrr ?? 0).toLocaleString()}</span></div>
      <div class="finance-row"><span class="finance-label">Total Expenses</span><span class="finance-value red">$${(data.totalExpenses ?? 0).toLocaleString()}</span></div>
      <div class="finance-row"><span class="finance-label">Net Profit</span><span class="finance-value">$${(data.netProfit ?? 0).toLocaleString()}</span></div>
      <div class="finance-row"><span class="finance-label">Pending Invoices</span><span class="finance-value amber">$${(data.pendingInvoices ?? 0).toLocaleString()}</span></div>
    `;
  }

  function renderRecentLeads(leads) {
    const container = document.getElementById('recentLeadsContainer');
    if (!leads || leads.length === 0) {
      container.innerHTML = '<div class="empty">No leads yet</div>';
      return;
    }
    container.innerHTML = leads.map(l => `
      <div class="lead-row">
        <span class="company">${l.companyName || '—'}</span>
        <span class="stage-badge">${l.stage || '—'}</span>
        <span class="deal">${l.dealValue ? '$' + l.dealValue.toLocaleString() : '—'}</span>
      </div>
    `).join('');
  }

  function renderLeaderboard(data) {
    const container = document.getElementById('leaderboardContainer');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty">No team data yet</div>';
      return;
    }
    const medals = ['🥇', '🥈', '🥉'];
    container.innerHTML = data.map((m, i) => `
      <div class="member-row">
        <span>${medals[i] || '•'} ${m.name || '—'}</span>
        <span class="score">${m.score ?? '—'}</span>
      </div>
    `).join('');
  }

  function renderAlerts(data) {
    const container = document.getElementById('alertsContainer');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty">No alerts</div>';
      return;
    }
    container.innerHTML = data.map(a => `
      <div class="alert-row">
        <div class="alert-dot" style="background:${a.color || '#fbbf24'}"></div>
        <span>${a.message || '—'}</span>
      </div>
    `).join('');
  }

  // Main fetch function
  async function loadDashboard() {
    showSkeleton();
    updateDate();

    try {
      const [statsRes, financeRes, alertsRes, leaderboardRes] = await Promise.all([
        fetch('/api/stats').catch(e => ({ ok: false, error: e })),
        fetch('/api/finance').catch(e => ({ ok: false, error: e })),
        fetch('/api/alerts').catch(e => ({ ok: false, error: e })),
        fetch('/api/leaderboard').catch(e => ({ ok: false, error: e }))
      ]);

      let stats = {}, finance = {}, alerts = [], leaderboard = [];

      if (statsRes.ok) stats = await statsRes.json();
      else throw new Error('Stats API failed');

      if (financeRes.ok) finance = await financeRes.json();
      else throw new Error('Finance API failed');

      if (alertsRes.ok) alerts = await alertsRes.json();
      if (leaderboardRes.ok) leaderboard = await leaderboardRes.json();

      renderStats(stats);
      renderPipeline(stats.stageStats || []);
      renderFinance(finance);
      renderRecentLeads(stats.recentLeads || []);
      renderLeaderboard(leaderboard);
      renderAlerts(alerts);

    } catch (err) {
      console.error('Dashboard load error:', err);
      showError('Failed to load dashboard data. Please refresh the page.');
    }
  }

  // Start loading
  loadDashboard();
</script>
</body>
</html>
