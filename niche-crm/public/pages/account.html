<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mon Compte</title><style>body{font-family:Arial;background:#0b0b0e;color:#eee;padding:30px}.box{max-width:700px;background:#15151d;border:1px solid #2a2a36;padding:20px;border-radius:14px}button{padding:10px 14px;border-radius:8px;border:none;background:#2b2fff;color:#fff}</style></head><body><div class='box'><h1>Mon Profil</h1><pre id='p'></pre><button onclick='logout()'>Logout</button></div><script>const u=JSON.parse(localStorage.getItem('crm_user')||'null');document.getElementById('p').textContent=u?JSON.stringify(u,null,2):'Not logged in';function logout(){localStorage.removeItem('crm_user');location.href='/login.html'}</script></body></html>
