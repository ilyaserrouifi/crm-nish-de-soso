<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Niche CRM - Tableau de bord professionnel avec données réelles" />
  <meta name="author" content="Niche CRM" />
  <title>Niche CRM — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0b0e;
      --blue: #2b2fff;
      --blue2: #4f5aff;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.07);
      --text: #ededf2;
      --muted: rgba(237, 237, 242, 0.4);
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --purple: #a78bfa;
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: rgba(43, 47, 255, 0.1); top: -150px; left: 200px; }
    .blob-2 { width: 350px; height: 350px; background: rgba(43, 47, 255, 0.06); bottom: -80px; right: 100px; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: rgba(255, 255, 255, 0.025);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      cursor: pointer;
    }
    .brand-mark{width:40px;height:40px;border-radius:999px;background:linear-gradient(160deg,#191c26 0%,#0e1018 55%,#171a24 100%);position:relative;display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
    .brand-mark::before{content:'N';font-weight:700;font-size:24px;line-height:1;color:#f4f6ff;font-family:'DM Sans',sans-serif;transform:translateX(-1px)}
    .brand-mark::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;background:#2b2fff;right:-2px;top:-2px;box-shadow:0 0 12px rgba(43,47,255,.8)}
    .logo-text .name{font-size:16px;font-weight:700;letter-spacing:.2px;color:var(--text-primary)}
    .logo-text .name { font-size: 16px; font-weight: 700; color: var(--text); }
    .logo-text .sub { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
    .nav-section { padding: 0 12px; margin-bottom: 24px; }
    .nav-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 0 12px 8px 12px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: 9px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.06); color: var(--text); }
    .nav-item.active { background: rgba(43, 47, 255, 0.15); border: 1px solid rgba(43, 47, 255, 0.25); color: var(--text); }
    .nav-item svg { width: 18px; height: 18px; opacity: 0.7; }
    .logout-btn {
      margin-top: auto;
      margin-bottom: 24px;
      margin-left: 12px;
      margin-right: 12px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 9px;
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: var(--transition);
    }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }

    /* Main Content */
    .main {
      margin-left: 220px;
      flex: 1;
      position: relative;
      z-index: 10;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 20;
    }
    .topbar-left h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .topbar-left p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--green);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .admin-avatar {
      width: 40px;
      height: 40px;
      background: var(--blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
      color: white;
    }

    .content { padding: 28px 32px; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      transition: var(--transition);
    }
    .stat-card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
    .stat-value { font-size: 32px; font-weight: 700; margin-top: 8px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    /* Pipeline scroll */
    .pipeline-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 32px;
    }
    .pipeline-scroll::-webkit-scrollbar { height: 4px; }
    .pipeline-scroll::-webkit-scrollbar-track { background: var(--border); border-radius: 4px; }
    .pipeline-scroll::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 4px; }
    .stage-card {
      min-width: 140px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .stage-card.won { border-color: rgba(74, 222, 128, 0.3); }
    .stage-card.lost { border-color: rgba(248, 113, 113, 0.3); }
    .stage-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
    .stage-count { font-size: 28px; font-weight: 700; }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 24px; }

    .finance-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .finance-row:last-child { border-bottom: none; }
    .finance-label { font-size: 13px; color: var(--muted); }
    .finance-value.green { color: var(--green); }
    .finance-value.red { color: var(--red); }
    .finance-value.amber { color: var(--amber); }

    .lead-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .lead-row:last-child { border-bottom: none; }
    .stage-badge { font-size: 10px; padding: 3px 8px; background: rgba(43, 47, 255, 0.15); border-radius: 20px; color: var(--blue); }
    .deal-value { color: var(--green); font-weight: 500; }

    .member-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .score-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .score-a { background: rgba(74, 222, 128, 0.15); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.3); }
    .score-b { background: rgba(43, 47, 255, 0.15); color: var(--blue); border: 1px solid rgba(43, 47, 255, 0.3); }
    .score-c { background: rgba(251, 191, 36, 0.15); color: var(--amber); border: 1px solid rgba(251, 191, 36, 0.3); }
    .score-d { background: rgba(248, 113, 113, 0.15); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.3); }

    .alert-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Analytics sparkline cards */
    .analytics-card { text-align: center; }
    .analytics-value { font-size: 28px; font-weight: 700; margin: 8px 0; }
    .analytics-sub { font-size: 11px; color: var(--muted); }
    .sparkline-svg { width: 100%; height: 52px; margin-top: 12px; }

    /* Bar chart */
    .bar-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 52px; margin-top: 12px; gap: 4px; }
    .bar { width: 16px; background: linear-gradient(180deg, rgba(167, 139, 250, 0.75), rgba(167, 139, 250, 0.5)); border-radius: 3px; transition: height 0.5s ease; }

    /* Map + countries */
    .map-card { padding: 0; overflow: hidden; }
    .map-header { padding: 18px 22px 12px; }
    #leafletMap { height: 320px; width: 100%; }
    .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.7); }
    .leaflet-container { background: #0d0d14; }

    .country-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .country-flag { font-size: 17px; width: 26px; }
    .country-name { width: 110px; font-size: 13px; }
    .country-bar-bg { flex: 1; height: 5px; background: rgba(255, 255, 255, 0.06); border-radius: 3px; overflow: hidden; }
    .country-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--blue2)); border-radius: 3px; width: 0%; transition: width 1.2s ease; }
    .country-percent { width: 30px; font-size: 12px; color: var(--muted); text-align: right; }

    /* Skeleton */
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; height: 18px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .empty-state { text-align: center; padding: 40px; color: var(--muted); }

    .error-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--red);
      padding: 12px 20px;
      border-radius: 10px;
      z-index: 999;
      font-size: 13px;
      backdrop-filter: blur(8px);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 1024px) { .stats-grid, .three-col { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; transition: transform 0.3s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .stats-grid, .two-col, .three-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="blob blob-2"></div>

<!-- MAIN CONTENT -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Dashboard</h1><p id="currentDate"></p></div>
    <div class="topbar-right"><div class="live-badge"><span class="live-dot"></span>Live</div><div class="admin-avatar">A</div></div>
  </div>
  <div class="content" id="app">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="three-col" id="executiveGrid"></div>
    <div class="pipeline-scroll" id="pipelineContainer"></div>
    <div class="two-col"><div class="card" id="financeCard"><div class="card-title">💰 FINANCE SNAPSHOT</div><div id="financeContainer"></div></div><div class="card" id="recentLeadsCard"><div class="card-title">📋 RECENT LEADS</div><div id="recentLeadsContainer"></div></div></div>
    <div class="two-col"><div class="card" id="leaderboardCard"><div class="card-title">🏆 TEAM LEADERBOARD</div><div id="leaderboardContainer"></div></div><div class="card" id="alertsCard"><div class="card-title">🔔 ACTIVE ALERTS</div><div id="alertsContainer"></div></div></div>
    <div class="card"><div class="card-title">📊 ANALYTICS OVERVIEW</div><div class="three-col" id="analyticsGrid"></div></div>
    <div class="two-col"><div class="card map-card"><div class="map-header">🌍 LEADS BY REGION</div><div id="leafletMap"></div></div><div class="card"><div class="card-title">🏆 TOP COUNTRIES</div><div id="topCountries"></div></div></div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // State
  let statsData = null;
  let financeData = null;
  let alertsData = [];
  let leaderboardData = [];
  let callersData = [];
  let clientsData = [];

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'error-toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  function formatCurrency(n) { return '$' + (n || 0).toLocaleString(); }
  function formatPct(n) { return (n || 0).toFixed(1) + '%'; }

  function setDate() { document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }

  function showSkeletons() {
    document.getElementById('statsGrid').innerHTML = Array(4).fill(`<div class="stat-card"><div class="skeleton" style="height:32px; width:80px"></div><div class="stat-label">—</div></div>`).join('');
    document.getElementById('pipelineContainer').innerHTML = Array(8).fill(`<div class="stage-card"><div class="skeleton" style="height:16px; margin-bottom:8px"></div><div class="skeleton" style="height:28px; width:40px; margin:0 auto"></div></div>`).join('');
    document.getElementById('financeContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
    document.getElementById('recentLeadsContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
    document.getElementById('leaderboardContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
    document.getElementById('alertsContainer').innerHTML = '<div class="skeleton" style="height:120px"></div>';
    document.getElementById('analyticsGrid').innerHTML = Array(3).fill(`<div class="skeleton" style="height:120px; border-radius:14px"></div>`).join('');
    document.getElementById('topCountries').innerHTML = '<div class="skeleton" style="height:200px"></div>';
    document.getElementById('executiveGrid').innerHTML = Array(3).fill(`<div class="card"><div class="skeleton" style="height:120px"></div></div>`).join('');
  }

  // Fetch APIs
  async function fetchStats() {
    try {
      const res = await fetch('/api/stats');
      if (!res.ok) throw new Error();
      statsData = await res.json();
    } catch (e) { statsData = { totalLeads: 0, totalClients: 0, activeTasks: 0, totalRevenue: 0, stageStats: [], recentLeads: [] }; showToast('Failed to load stats'); }
  }
  async function fetchFinance() {
    try { const res = await fetch('/api/finance/stats'); if (!res.ok) throw new Error(); financeData = await res.json(); } 
    catch (e) { financeData = { mrr: 0, totalRevenue: 0, totalExpenses: 0, netProfit: 0 }; showToast('Failed to load finance data'); }
  }
  async function fetchAlerts() {
    try { const res = await fetch('/api/alerts'); if (!res.ok) throw new Error(); alertsData = await res.json(); } 
    catch (e) { alertsData = []; }
  }
  async function fetchLeaderboard() {
    try { const res = await fetch('/api/leaderboard'); if (!res.ok) throw new Error(); leaderboardData = await res.json(); } 
    catch (e) { leaderboardData = []; }
  }
  async function fetchCallers() {
    try { const res = await fetch('/api/cold-callers'); if (!res.ok) throw new Error(); callersData = await res.json(); } 
    catch (e) { callersData = []; }
  }


  async function fetchClients() {
    try {
      const res = await fetch('/api/clients');
      if (!res.ok) throw new Error();
      clientsData = await res.json();
    } catch (e) {
      clientsData = [];
    }
  }

  // Render functions
  function renderStats() {
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-value" style="color:#60a5fa">${statsData?.totalLeads ?? 0}</div><div class="stat-label">📊 TOTAL LEADS</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#a78bfa">${statsData?.totalClients ?? 0}</div><div class="stat-label">🏢 ACTIVE CLIENTS</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#4ade80">${statsData?.activeTasks ?? 0}</div><div class="stat-label">✓ ACTIVE TASKS</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#fbbf24">${formatCurrency(statsData?.totalRevenue ?? 0)}</div><div class="stat-label">💰 REVENUE</div></div>
    `;
  }


  function renderExecutiveSummary() {
    const stageMap = {};
    (statsData?.stageStats || []).forEach(s => { stageMap[s.stage] = s._count || 0; });

    const leads = stageMap.LEAD || 0;
    const contacted = stageMap.CONTACTED || 0;
    const meeting = stageMap.MEETING_BOOKED || 0;
    const proposal = stageMap.PROPOSAL_SENT || 0;
    const won = stageMap.CLOSED_WON || 0;

    const winRate = leads > 0 ? (won / leads) * 100 : 0;
    const thisMonthPipeline = (statsData?.recentLeads || []).reduce((sum, l) => sum + (l.dealValue || 0), 0);
    const totalPipeline = thisMonthPipeline + ((stageMap.NEGOTIATING || 0) * 1000);
    const atRiskPipeline = (stageMap.NEGOTIATING || 0) * 1000;

    const topPerformer = leaderboardData?.[0]?.name || '—';
    const needsAttention = leaderboardData?.length
      ? (leaderboardData.find(p => (p.score || '').toUpperCase() === 'D')?.name || leaderboardData[leaderboardData.length - 1]?.name || '—')
      : '—';

    document.getElementById('executiveGrid').innerHTML = `
      <div class="card"><div class="card-title">TODAY'S NUMBERS</div>
        <div class="finance-row"><span class="finance-label">Calls Made</span><span>${callersData.reduce((s,c)=>s+(c.callsMade||0),0)}</span></div>
        <div class="finance-row"><span class="finance-label">Meetings Booked</span><span>${callersData.reduce((s,c)=>s+(c.meetingsBooked||0),0)}</span></div>
        <div class="finance-row"><span class="finance-label">Deals Closed</span><span>${won}</span></div>
        <div class="finance-row"><span class="finance-label">Revenue Today</span><span>${formatCurrency(statsData?.totalRevenue || 0)}</span></div>
      </div>

      <div class="card"><div class="card-title">PIPELINE VALUE</div>
        <div class="finance-row"><span class="finance-label">Total</span><span>${formatCurrency(totalPipeline)}</span></div>
        <div class="finance-row"><span class="finance-label">This Month</span><span>${formatCurrency(thisMonthPipeline)}</span></div>
        <div class="finance-row"><span class="finance-label">At Risk</span><span class="finance-value amber">${formatCurrency(atRiskPipeline)}</span></div>
        <div class="finance-row"><span class="finance-label">Lead → Won</span><span>${formatPct(winRate)}</span></div>
      </div>

      <div class="card"><div class="card-title">TEAM PERFORMANCE</div>
        <div class="finance-row"><span class="finance-label">Top Performer</span><span>${escapeHtml(topPerformer)}</span></div>
        <div class="finance-row"><span class="finance-label">Needs Attention</span><span class="finance-value red">${escapeHtml(needsAttention)}</span></div>
        <div class="finance-row"><span class="finance-label">Active Alerts</span><span>${alertsData.length}</span></div>
        <div class="finance-row"><span class="finance-label">Meeting Stage</span><span>${meeting}</span></div>
      </div>
    `;
  }

  function renderPipeline() {
    const stages = { LEAD: 'Lead', CONTACTED: 'Contacted', MEETING_BOOKED: 'Meeting', QUALIFIED: 'Qualified', PROPOSAL_SENT: 'Proposal', NEGOTIATING: 'Negotiating', CLOSED_WON: 'Won ✅', CLOSED_LOST: 'Lost ❌' };
    const stageMap = {};
    (statsData?.stageStats || []).forEach(s => { stageMap[s.stage] = s._count; });
    const container = document.getElementById('pipelineContainer');
    container.innerHTML = Object.entries(stages).map(([key, label]) => {
      const count = stageMap[key] ?? 0;
      let extra = '';
      if (key === 'CLOSED_WON') extra = 'won';
      if (key === 'CLOSED_LOST') extra = 'lost';
      return `<div class="stage-card ${extra}"><div class="stage-name">${label}</div><div class="stage-count">${count}</div></div>`;
    }).join('');
  }

  function renderFinance() {
    document.getElementById('financeContainer').innerHTML = `
      <div class="finance-row"><span class="finance-label">MRR</span><span class="finance-value green">${formatCurrency(financeData?.mrr ?? 0)}</span></div>
      <div class="finance-row"><span class="finance-label">Total Expenses</span><span class="finance-value red">${formatCurrency(financeData?.totalExpenses ?? 0)}</span></div>
      <div class="finance-row"><span class="finance-label">Net Profit</span><span class="finance-value">${formatCurrency(financeData?.netProfit ?? 0)}</span></div>
      <div class="finance-row"><span class="finance-label">Pending Invoices</span><span class="finance-value amber">${financeData?.pendingInvoicesCount ?? 'N/A'}</span></div>
    `;
  }

  function renderRecentLeads() {
    const leads = statsData?.recentLeads || [];
    const container = document.getElementById('recentLeadsContainer');
    if (!leads.length) { container.innerHTML = '<div class="empty-state">No leads yet</div>'; return; }
    container.innerHTML = leads.map(l => `
      <div class="lead-row"><span>${escapeHtml(l.companyName || '—')}</span><span class="stage-badge">${l.stage || '—'}</span><span class="deal-value">${formatCurrency(l.dealValue)}</span></div>
    `).join('');
  }

  function renderLeaderboard() {
    const container = document.getElementById('leaderboardContainer');
    if (!leaderboardData.length) { container.innerHTML = '<div class="empty-state">No team data yet</div>'; return; }
    const medals = ['🥇', '🥈', '🥉'];
    container.innerHTML = leaderboardData.map((p, i) => `
      <div class="member-row"><span>${medals[i] || '•'} ${escapeHtml(p.name)}</span><span class="score-badge score-${(p.score || 'd').toLowerCase()}">${p.score || 'D'}</span></div>
    `).join('');
  }

  function renderAlerts() {
    const container = document.getElementById('alertsContainer');
    if (!alertsData.length) { container.innerHTML = '<div class="empty-state">No alerts</div>'; return; }
    const severityColor = { high: '#f87171', medium: '#fbbf24', low: '#2b2fff' };
    container.innerHTML = alertsData.map(a => `
      <div class="alert-row"><div class="alert-dot" style="background:${severityColor[a.severity] || '#2b2fff'}"></div><span>${escapeHtml(a.message)}</span></div>
    `).join('');
  }

  function renderAnalytics() {
    const totalCallsToday = callersData.reduce((sum, c) => sum + (c.callsMade || 0), 0);
    const activeCallers = callersData.filter(c => (c.status || '').toLowerCase() === 'active').length;
    const avgCalls = activeCallers ? Math.round(totalCallsToday / activeCallers) : 0;
    const totalLeads = statsData?.totalLeads || 0;
    const closedWon = (statsData?.stageStats || []).find(s => s.stage === 'CLOSED_WON')?._count || 0;
    const meetingsBooked = callersData.reduce((sum, c) => sum + (c.meetingsBooked || 0), 0);
    const convRate = totalLeads > 0 ? (closedWon / totalLeads * 100) : 0;
    const mrr = financeData?.mrr || 0;
    document.getElementById('analyticsGrid').innerHTML = `
      <div class="card analytics-card"><div class="card-title">📈 CURRENT MRR</div><div class="analytics-value">${formatCurrency(mrr)}</div><div class="analytics-sub">Live total from active client contracts</div></div>
      <div class="card analytics-card"><div class="card-title">📞 AVG CALLS / ACTIVE CALLER</div><div class="analytics-value">${avgCalls}</div><div class="analytics-sub">Computed from total calls and active callers</div></div>
      <div class="card analytics-card"><div class="card-title">🎯 CLOSED-WON RATE</div><div class="analytics-value">${formatPct(convRate)}</div><div class="analytics-sub">${closedWon} won / ${totalLeads} total leads · Meetings booked: ${meetingsBooked}</div></div>
    `;
  }

  function countryFlag(codeOrName) {
    const byName = {
      'united states': 'US', 'united kingdom': 'GB', canada: 'CA', australia: 'AU', germany: 'DE',
      france: 'FR', spain: 'ES', italy: 'IT', morocco: 'MA', uae: 'AE', 'united arab emirates': 'AE'
    };
    const raw = String(codeOrName || '').trim();
    const code = raw.length === 2 ? raw.toUpperCase() : (byName[raw.toLowerCase()] || '');
    if (!code || code.length !== 2) return '🌍';
    return String.fromCodePoint(...[...code].map(c => 127397 + c.charCodeAt(0)));
  }

  function getCountryDistribution() {
    const map = {};
    clientsData.forEach(c => {
      const key = (c.country || 'Unknown').trim() || 'Unknown';
      map[key] = (map[key] || 0) + 1;
    });
    const entries = Object.entries(map).map(([name, count]) => ({ name, count }));
    entries.sort((a, b) => b.count - a.count);
    return entries;
  }

  function renderTopCountries() {
    const dist = getCountryDistribution().slice(0, 8);
    const container = document.getElementById('topCountries');
    if (!dist.length) {
      container.innerHTML = '<div class="empty-state">No client location data yet</div>';
      return;
    }
    const max = dist[0].count || 1;
    container.innerHTML = dist.map(c => {
      const pct = Math.round((c.count / max) * 100);
      return `
      <div class="country-row"><span class="country-flag">${countryFlag(c.name)}</span><span class="country-name">${escapeHtml(c.name)}</span><div class="country-bar-bg"><div class="country-bar-fill" data-width="${pct}%"></div></div><span class="country-percent">${c.count}</span></div>
    `}).join('');
    setTimeout(() => { document.querySelectorAll('.country-bar-fill').forEach(bar => { bar.style.width = bar.dataset.width; }); }, 300);
  }

  let mapInitialized = false;
  const geoCache = new Map();

  async function geocodeCountry(countryName) {
    const key = String(countryName || '').trim().toLowerCase();
    if (!key || key === 'unknown') return null;
    if (geoCache.has(key)) return geoCache.get(key);

    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(countryName)}`;
      const res = await fetch(url, { headers: { Accept: 'application/json' } });
      if (!res.ok) throw new Error('Geocoding failed');
      const rows = await res.json();
      const item = rows?.[0];
      const coords = item ? [Number(item.lat), Number(item.lon)] : null;
      geoCache.set(key, coords);
      return coords;
    } catch (err) {
      geoCache.set(key, null);
      return null;
    }
  }

  async function initMap() {
    if (mapInitialized || typeof L === 'undefined') { setTimeout(initMap, 300); return; }
    const mapContainer = document.getElementById('leafletMap');
    if (!mapContainer) return;

    const dist = getCountryDistribution().filter(r => r.name.toLowerCase() !== 'unknown');
    const map = L.map('leafletMap').setView([20, 10], 2);
    map.attributionControl.setPrefix(false);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '' }).addTo(map);

    if (!dist.length) {
      mapInitialized = true;
      return;
    }

    const max = dist[0]?.count || 1;
    const markerLatLngs = [];

    for (const r of dist) {
      const center = await geocodeCountry(r.name);
      if (!center) continue;
      const pct = Math.round((r.count / max) * 100);
      const size = Math.max(8, Math.min(26, 6 + r.count * 1.5));
      const marker = L.circleMarker(center, { radius: size, color: '#2b2fff', weight: 2, opacity: 0.8, fillOpacity: 0.6, fillColor: '#4f5aff' }).addTo(map);
      marker.bindPopup(`<b>${escapeHtml(r.name)}</b><br/>${r.count} client(s)<br/>${pct}% vs top country`);
      markerLatLngs.push(center);
    }

    if (markerLatLngs.length) {
      map.fitBounds(markerLatLngs, { padding: [30, 30] });
    }

    mapInitialized = true;
  }


  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  async function loadDashboard() {
    showSkeletons();
    await Promise.all([fetchStats(), fetchFinance(), fetchAlerts(), fetchLeaderboard(), fetchCallers(), fetchClients()]);
    renderStats(); renderExecutiveSummary(); renderPipeline(); renderFinance(); renderRecentLeads(); renderLeaderboard(); renderAlerts(); renderAnalytics(); renderTopCountries();
    initMap();
  }

  setDate();
  loadDashboard();
</script>
</body>
