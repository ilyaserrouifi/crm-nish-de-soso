<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Niche CRM - Gestion des tâches" />
  <meta name="author" content="Niche CRM" />
  <title>Niche CRM — Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #0b0b0e;
      --blue-primary: #2b2fff;
      --blue-hover: #4f5aff;
      --blue-glow: rgba(43, 47, 255, 0.35);
      --surface-card: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.06);
      --border-subtle: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf2;
      --text-muted: rgba(237, 237, 242, 0.4);
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --purple: #a78bfa;
      --blue-light: #60a5fa;
      --transition: all 0.2s ease;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .blob-1 { width: 500px; height: 500px; background: rgba(43, 47, 255, 0.1); top: -150px; left: 200px; }
    .blob-2 { width: 350px; height: 350px; background: rgba(43, 47, 255, 0.06); bottom: -80px; right: 100px; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: rgba(255, 255, 255, 0.025);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 24px;
      cursor: pointer;
    }
    .brand-mark{width:40px;height:40px;border-radius:999px;background:linear-gradient(160deg,#191c26 0%,#0e1018 55%,#171a24 100%);position:relative;display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
    .brand-mark::before{content:'N';font-weight:700;font-size:24px;line-height:1;color:#f4f6ff;font-family:'DM Sans',sans-serif;transform:translateX(-1px)}
    .brand-mark::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;background:#2b2fff;right:-2px;top:-2px;box-shadow:0 0 12px rgba(43,47,255,.8)}
    .logo-text .name{font-size:16px;font-weight:700;letter-spacing:.2px;color:var(--text-primary)}
    .logo-text .name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .logo-text .sub { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
    .nav-section { padding: 0 12px; margin-bottom: 24px; }
    .nav-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 0 12px 8px 12px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: 9px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }
    .nav-item:hover { background: var(--surface-hover); color: var(--text-primary); }
    .nav-item.active { background: rgba(43, 47, 255, 0.15); border: 1px solid rgba(43, 47, 255, 0.25); color: var(--text-primary); }
    .nav-item svg { width: 18px; height: 18px; opacity: 0.7; }
    .logout-btn {
      margin-top: auto;
      margin-bottom: 24px;
      margin-left: 12px;
      margin-right: 12px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 9px;
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: var(--transition);
    }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }

    /* Main Content */
    .main {
      margin-left: 220px;
      flex: 1;
      position: relative;
      z-index: 10;
      min-height: 100vh;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 0;
      background: var(--bg-deep);
      z-index: 20;
    }
    .topbar-left h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .topbar-left p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .add-btn {
      background: var(--blue-primary);
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      color: white;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 0 20px var(--blue-glow);
      transition: var(--transition);
    }
    .add-btn:hover { background: var(--blue-hover); transform: translateY(-1px); }

    .content { padding: 28px 32px; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 20px 24px;
      transition: var(--transition);
    }
    .stat-card:hover { background: var(--surface-hover); transform: translateY(-2px); }
    .stat-value { font-size: 32px; font-weight: 700; margin-top: 8px; }
    .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }
    .view-toggle {
      display: flex;
      gap: 6px;
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 4px;
    }
    .view-btn {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      background: transparent;
      color: var(--text-muted);
    }
    .view-btn.active { background: var(--blue-primary); color: white; }
    .toolbar input, .toolbar select {
      background: rgba(255, 255, 255, 0.042);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .toolbar input { flex: 1; min-width: 200px; }

    /* Kanban Board */
    .kanban-board {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 16px;
      align-items: flex-start;
    }
    .kanban-column {
      min-width: 280px;
      max-width: 280px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 16px;
    }
    .column-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .column-dot { width: 10px; height: 10px; border-radius: 50%; }
    .column-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; flex: 1; }
    .column-count { font-size: 12px; color: var(--text-muted); background: var(--surface-card); padding: 2px 8px; border-radius: 20px; }
    .task-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: var(--transition);
    }
    .task-card:hover {
      background: var(--surface-hover);
      border-color: rgba(43, 47, 255, 0.3);
      transform: translateY(-1px);
    }
    .task-card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .priority-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 500; }
    .priority-high { background: rgba(248, 113, 113, 0.15); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.3); }
    .priority-medium { background: rgba(251, 191, 36, 0.15); color: var(--amber); border: 1px solid rgba(251, 191, 36, 0.3); }
    .priority-low { background: rgba(74, 222, 128, 0.15); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.3); }
    .visible-badge { font-size: 10px; color: var(--blue-light); }
    .task-name { font-weight: 600; margin-bottom: 6px; font-size: 13px; }
    .task-client { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
    .task-footer { display: flex; justify-content: space-between; align-items: center; }
    .task-assignee { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .mini-avatar {
      width: 22px; height: 22px;
      background: rgba(43, 47, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--purple);
    }
    .task-deadline { font-size: 10px; color: var(--text-muted); }
    .overdue { color: var(--red) !important; }

    /* List View Table */
    .tasks-table {
      width: 100%;
      border-collapse: collapse;
    }
    .tasks-table th {
      text-align: left;
      padding: 12px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
    }
    .tasks-table td {
      padding: 12px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .tasks-table tr { cursor: pointer; transition: var(--transition); }
    .tasks-table tr:hover td { background: rgba(255, 255, 255, 0.02); }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; }
    .status-to-do { background: rgba(96, 165, 250, 0.15); color: var(--blue-light); }
    .status-in-progress { background: rgba(251, 191, 36, 0.15); color: var(--amber); }
    .status-in-review { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
    .status-revision { background: rgba(248, 113, 113, 0.15); color: var(--red); }
    .status-done { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .row-actions { display: flex; gap: 6px; }
    .row-actions button { background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 11px; transition: var(--transition); }
    .row-actions button:hover { background: rgba(43, 47, 255, 0.2); }
    .row-actions button.danger:hover { background: rgba(248, 113, 113, 0.2); color: var(--red); }

    /* Detail Panel */
    .detail-panel {
      position: fixed;
      right: -520px;
      top: 0;
      width: 500px;
      height: 100vh;
      background: #13131a;
      border-left: 1px solid var(--border-subtle);
      transition: right 0.3s ease;
      z-index: 200;
      overflow-y: auto;
    }
    .detail-panel.open { right: 0; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 0;
      background: #13131a;
    }
    .panel-header h2 { font-size: 20px; font-weight: 600; }
    .close-panel { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    .panel-content { padding: 24px 28px; }
    .task-detail-row { display: flex; margin-bottom: 20px; align-items: center; }
    .task-detail-label { width: 110px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .task-detail-value { flex: 1; font-weight: 500; }
    .status-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; }
    .status-option {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      transition: var(--transition);
    }
    .status-option.active { background: var(--blue-primary); color: white; }
    .toggle-switch {
      width: 44px;
      height: 22px;
      background: var(--border-subtle);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      transition: var(--transition);
    }
    .toggle-switch.active { background: var(--blue-primary); }
    .toggle-slider {
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 3px;
      transition: 0.2s;
    }
    .toggle-switch.active .toggle-slider { left: 23px; }
    .updates-log { margin: 20px 0; max-height: 300px; overflow-y: auto; }
    .update-item { padding: 10px 0; border-bottom: 1px solid var(--border-subtle); font-size: 12px; }
    .update-date { color: var(--text-muted); font-size: 10px; margin-bottom: 4px; }
    .add-update { display: flex; gap: 8px; margin-top: 12px; }
    .add-update input { flex: 1; background: rgba(255,255,255,0.042); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 8px 12px; color: white; }
    .btn-small { background: var(--blue-primary); border: none; border-radius: 8px; padding: 8px 16px; color: white; cursor: pointer; }

    /* Skeleton */
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; height: 80px; margin-bottom: 10px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }

    .error-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--red);
      padding: 12px 20px;
      border-radius: 10px;
      z-index: 999;
      font-size: 13px;
      backdrop-filter: blur(8px);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; transition: transform 0.3s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .detail-panel { width: 100%; right: -100%; }
      .kanban-board { display: none; }
      .list-view { display: block; }
    }
    .list-view { display: none; }
  </style>
</head>

<!-- MAIN CONTENT -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Tasks</h1><p>Manage all project tasks</p></div>
    <button class="add-btn" onclick="openAddModal()">+ Add Task</button>
  </div>
  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="toolbar">
      <div class="view-toggle"><div class="view-btn active" id="kanbanBtn" onclick="setView('kanban')">⬛ Kanban</div><div class="view-btn" id="listBtn" onclick="setView('list')">☰ List</div></div>
      <input type="text" id="searchInput" placeholder="Search tasks..." />
      <select id="priorityFilter"><option value="all">All Priority</option><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select>
      <select id="assigneeFilter"><option value="all">All Assignees</option></select>
    </div>
    <div id="kanbanView" class="kanban-board"></div>
    <div id="listView" class="list-view"><table class="tasks-table"><thead><tr><th>Task</th><th>Client</th><th>Assigned To</th><th>Priority</th><th>Deadline</th><th>Status</th><th>Actions</th></tr></thead><tbody id="listBody"></tbody></table></div>
  </div>
</main>

<!-- Add Modal -->
<div id="addModal" class="modal-overlay"><div class="modal-card"><h2>Add New Task</h2><form id="addForm" onsubmit="addTask(event)"><div class="form-group"><label>Task Name *</label><input type="text" id="addName" required></div><div class="form-group"><label>Client</label><select id="addClientId"></select></div><div class="form-group"><label>Assign To</label><select id="addAssignee"></select></div><div class="form-group"><label>Deadline</label><input type="date" id="addDeadline"></div><div class="form-group"><label>Priority</label><select id="addPriority"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select></div><div class="form-group"><label>Status</label><select id="addStatus"><option value="To Do">To Do</option><option value="In Progress">In Progress</option><option value="In Review">In Review</option><option value="Revision">Revision</option><option value="Done">Done</option></select></div><div class="form-group"><label>Visible to Client</label><select id="addVisible"><option value="true">Yes</option><option value="false">No</option></select></div><div class="modal-buttons"><button type="submit" id="addSubmitBtn" class="btn-primary">Add Task</button><button type="button" class="btn-secondary" onclick="closeModal('addModal')">Cancel</button></div></form></div></div>
<div id="editModal" class="modal-overlay"><div class="modal-card"><h2>Edit Task</h2><form id="editForm" onsubmit="editTask(event)"><input type="hidden" id="editId"><div class="form-group"><label>Task Name *</label><input type="text" id="editName" required></div><div class="form-group"><label>Client</label><select id="editClientId"></select></div><div class="form-group"><label>Assign To</label><select id="editAssignee"></select></div><div class="form-group"><label>Deadline</label><input type="date" id="editDeadline"></div><div class="form-group"><label>Priority</label><select id="editPriority"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select></div><div class="form-group"><label>Visible to Client</label><select id="editVisible"><option value="true">Yes</option><option value="false">No</option></select></div><div class="modal-buttons"><button type="submit" class="btn-primary">Save Changes</button><button type="button" class="btn-secondary" onclick="closeModal('editModal')">Cancel</button></div></form></div></div>

<!-- Detail Panel -->
<div id="taskPanel" class="detail-panel"><div class="panel-header"><h2 id="panelTaskName">Task Details</h2><button class="close-panel" onclick="closePanel()">✕</button></div><div class="panel-content" id="panelContent"></div></div>

<script>
  let allTasks = [], allClients = [], allFreelancers = [], currentTask = null;
  function showError(msg) { const toast = document.createElement('div'); toast.className = 'error-toast'; toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 4000); }
  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function closePanel() { document.getElementById('taskPanel').classList.remove('open'); }

  function formatDeadline(deadline) {
    if (!deadline) return '—';
    const d = new Date(deadline);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
    if (diff < 0) return `${Math.abs(diff)}d overdue`;
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    return d.toLocaleDateString();
  }
  function isOverdue(task) { return task.deadline && new Date(task.deadline) < new Date() && task.status !== 'Done'; }

  async function loadDropdowns() {
    try {
      const [clients, freelancers] = await Promise.all([fetch('/api/clients').then(r=>r.json()), fetch('/api/freelancers').then(r=>r.json())]);
      allClients = clients; allFreelancers = freelancers;
      const clientSelects = ['addClientId', 'editClientId'];
      clientSelects.forEach(id => { const sel = document.getElementById(id); if(sel) sel.innerHTML = '<option value="">— Select Client —</option>' + (clients||[]).map(c => `<option value="${c.id}">${c.company}</option>`).join(''); });
      const assigneeSelects = ['addAssignee', 'editAssignee'];
      assigneeSelects.forEach(id => { const sel = document.getElementById(id); if(sel) sel.innerHTML = '<option value="">— Unassigned —</option>' + (freelancers||[]).map(f => `<option value="${f.id}">${f.name}</option>`).join(''); });
      const filterSel = document.getElementById('assigneeFilter');
      if(filterSel) filterSel.innerHTML = '<option value="all">All Assignees</option>' + (freelancers||[]).map(f => `<option value="${f.id}">${f.name}</option>`).join('');
    } catch(e) { console.error('Failed to load dropdowns', e); }
  }

  function renderStats(tasks) {
    const total = tasks.length, inProgress = tasks.filter(t=>t.status==='In Progress').length, done = tasks.filter(t=>t.status==='Done').length, overdue = tasks.filter(t=>t.deadline && new Date(t.deadline)<new Date() && t.status!=='Done').length;
    document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="stat-value" style="color:#60a5fa">${total}</div><div class="stat-label">Total Tasks</div></div><div class="stat-card"><div class="stat-value" style="color:#fbbf24">${inProgress}</div><div class="stat-label">In Progress</div></div><div class="stat-card"><div class="stat-value" style="color:#4ade80">${done}</div><div class="stat-label">Completed</div></div><div class="stat-card"><div class="stat-value" style="color:#f87171">${overdue}</div><div class="stat-label">Overdue</div></div>`;
  }

  function renderKanban(tasks) {
    const statuses = ['To Do', 'In Progress', 'In Review', 'Revision', 'Done'];
    const colors = { 'To Do':'#60a5fa', 'In Progress':'#fbbf24', 'In Review':'#a78bfa', 'Revision':'#f87171', 'Done':'#4ade80' };
    const board = document.getElementById('kanbanView');
    board.innerHTML = statuses.map(status => {
      const columnTasks = tasks.filter(t => t.status === status);
      return `<div class="kanban-column"><div class="column-header"><div class="column-dot" style="background:${colors[status]}"></div><div class="column-title">${status}</div><div class="column-count">${columnTasks.length}</div></div><div class="column-cards">${columnTasks.map(t => `<div class="task-card" onclick="openTask('${t.id}')"><div class="task-card-header"><span class="priority-badge priority-${(t.priority||'medium').toLowerCase()}">${t.priority||'Medium'}</span>${t.visibleToClient ? '<span class="visible-badge">👁 Client</span>' : ''}</div><div class="task-name">${escapeHtml(t.name)}</div><div class="task-client">📁 ${t.clientName || '—'}</div><div class="task-footer"><div class="task-assignee"><div class="mini-avatar">${(t.assignedName||'?')[0]}</div><span>${t.assignedName || 'Unassigned'}</span></div><span class="task-deadline ${isOverdue(t) ? 'overdue' : ''}">${formatDeadline(t.deadline)}</span></div></div>`).join('')}</div></div>`;
    }).join('');
  }

  function renderList(tasks) {
    const tbody = document.getElementById('listBody');
    tbody.innerHTML = tasks.map(t => `<tr onclick="openTask('${t.id}')"><td>${escapeHtml(t.name)}</td><td>${t.clientName || '—'}</td><td>${t.assignedName || '—'}</td><td><span class="priority-badge priority-${(t.priority||'medium').toLowerCase()}">${t.priority||'Medium'}</span></td><td class="${isOverdue(t)?'overdue':''}">${formatDeadline(t.deadline)}</td><td><span class="status-badge status-${t.status.toLowerCase().replace(/ /g,'-')}">${t.status}</span></td><td><div class="row-actions"><button onclick="event.stopPropagation(); openEditModal('${t.id}')">Edit</button><button onclick="event.stopPropagation(); deleteTask('${t.id}')" class="danger">Delete</button></div></td></tr>`).join('');
  }

  function filterTasks() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const priority = document.getElementById('priorityFilter').value;
    const assignee = document.getElementById('assigneeFilter').value;
    let filtered = allTasks.filter(t => (t.name||'').toLowerCase().includes(q) || (t.clientName||'').toLowerCase().includes(q));
    if (priority !== 'all') filtered = filtered.filter(t => t.priority === priority);
    if (assignee !== 'all') filtered = filtered.filter(t => t.assignedTo === assignee);
    renderStats(filtered);
    renderKanban(filtered);
    renderList(filtered);
  }

  async function loadTasks() {
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error('Failed');
      allTasks = await res.json();
      filterTasks();
    } catch(e) { showError('Failed to load tasks'); }
  }

  async function openTask(id) {
    try {
      const res = await fetch(`/api/tasks/${id}`);
      if (!res.ok) throw new Error();
      currentTask = await res.json();
      const panel = document.getElementById('taskPanel');
      panel.classList.add('open');
      renderTaskPanel();
    } catch(e) { showError('Failed to load task details'); }
  }

  function renderTaskPanel() {
    const t = currentTask;
    const statuses = ['To Do', 'In Progress', 'In Review', 'Revision', 'Done'];
    document.getElementById('panelContent').innerHTML = `
      <div class="task-detail-row"><div class="task-detail-label">Task Name</div><div class="task-detail-value">${escapeHtml(t.name)}</div></div>
      <div class="task-detail-row"><div class="task-detail-label">Client</div><div class="task-detail-value">${t.clientName || '—'}</div></div>
      <div class="task-detail-row"><div class="task-detail-label">Assigned To</div><div class="task-detail-value">${t.assignedName || 'Unassigned'}</div></div>
      <div class="task-detail-row"><div class="task-detail-label">Deadline</div><div class="task-detail-value ${isOverdue(t)?'overdue':''}">${formatDeadline(t.deadline)}</div></div>
      <div class="task-detail-row"><div class="task-detail-label">Priority</div><div class="task-detail-value"><span class="priority-badge priority-${(t.priority||'medium').toLowerCase()}">${t.priority||'Medium'}</span></div></div>
      <div class="status-buttons">${statuses.map(s => `<div class="status-option ${t.status===s?'active':''}" onclick="updateStatus('${s}')">${s}</div>`).join('')}</div>
      <div class="task-detail-row"><div class="task-detail-label">Client Portal</div><div class="task-detail-value"><div class="toggle-switch ${t.visibleToClient?'active':''}" onclick="toggleVisibility()"><div class="toggle-slider"></div></div><span style="margin-left:12px">${t.visibleToClient ? '✅ Visible to client' : '❌ Internal only'}</span></div></div>
      <div class="updates-log"><div class="task-detail-label">Updates</div>${(t.updates||[]).map(u => `<div class="update-item"><div class="update-date">${new Date(u.date).toLocaleString()} — ${escapeHtml(u.person)}</div><div>${escapeHtml(u.note)}</div></div>`).join('')}</div>
      <div class="add-update"><input type="text" id="newUpdateNote" placeholder="Add an update..."><button class="btn-small" onclick="addUpdate()">Post</button></div>
    `;
  }

  async function updateStatus(newStatus) {
    try {
      const res = await fetch(`/api/tasks/${currentTask.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...currentTask, status: newStatus }) });
      if (!res.ok) throw new Error();
      currentTask.status = newStatus;
      renderTaskPanel();
      loadTasks();
    } catch(e) { showError('Failed to update status'); }
  }

  async function toggleVisibility() {
    try {
      const newVisible = !currentTask.visibleToClient;
      const res = await fetch(`/api/tasks/${currentTask.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...currentTask, visibleToClient: newVisible }) });
      if (!res.ok) throw new Error();
      currentTask.visibleToClient = newVisible;
      renderTaskPanel();
      loadTasks();
    } catch(e) { showError('Failed to update visibility'); }
  }

  async function addUpdate() {
    const note = document.getElementById('newUpdateNote')?.value;
    if (!note) return;
    const newUpdate = { date: new Date().toISOString(), person: 'Admin', note };
    const updates = [...(currentTask.updates || []), newUpdate];
    try {
      const res = await fetch(`/api/tasks/${currentTask.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...currentTask, updates }) });
      if (!res.ok) throw new Error();
      currentTask.updates = updates;
      renderTaskPanel();
      loadTasks();
    } catch(e) { showError('Failed to add update'); }
  }

  async function addTask(e) {
    e.preventDefault();
    const body = { name: document.getElementById('addName').value, clientId: document.getElementById('addClientId').value, assignedTo: document.getElementById('addAssignee').value, deadline: document.getElementById('addDeadline').value, priority: document.getElementById('addPriority').value, status: document.getElementById('addStatus').value, visibleToClient: document.getElementById('addVisible').value === 'true' };
    try {
      const res = await fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error();
      closeModal('addModal'); loadTasks();
    } catch(e) { alert('Error saving task'); }
  }

  async function openEditModal(id) {
    const t = allTasks.find(t => t.id === id);
    if (!t) return;
    document.getElementById('editId').value = t.id;
    document.getElementById('editName').value = t.name || '';
    document.getElementById('editClientId').value = t.clientId || '';
    document.getElementById('editAssignee').value = t.assignedTo || '';
    document.getElementById('editDeadline').value = t.deadline ? t.deadline.split('T')[0] : '';
    document.getElementById('editPriority').value = t.priority || 'Medium';
    document.getElementById('editVisible').value = t.visibleToClient ? 'true' : 'false';
    openModal('editModal');
  }

  async function editTask(e) {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const body = { name: document.getElementById('editName').value, clientId: document.getElementById('editClientId').value, assignedTo: document.getElementById('editAssignee').value, deadline: document.getElementById('editDeadline').value, priority: document.getElementById('editPriority').value, visibleToClient: document.getElementById('editVisible').value === 'true' };
    try {
      const res = await fetch(`/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error();
      closeModal('editModal'); loadTasks();
    } catch(e) { alert('Error updating task'); }
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try {
      const res = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      loadTasks();
    } catch(e) { alert('Failed to delete task'); }
  }

  function setView(view) {
    document.getElementById('kanbanView').style.display = view === 'kanban' ? 'flex' : 'none';
    document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
    document.getElementById('kanbanBtn').classList.toggle('active', view === 'kanban');
    document.getElementById('listBtn').classList.toggle('active', view === 'list');
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  document.getElementById('searchInput').addEventListener('input', filterTasks);
  document.getElementById('priorityFilter').addEventListener('change', filterTasks);
  document.getElementById('assigneeFilter').addEventListener('change', filterTasks);
  window.openAddModal = () => openModal('addModal');
  window.closeModal = closeModal;
  window.openEditModal = openEditModal;
  window.deleteTask = deleteTask;
  window.openTask = openTask;
  window.closePanel = closePanel;
  window.updateStatus = updateStatus;
  window.toggleVisibility = toggleVisibility;
  window.addUpdate = addUpdate;
  window.addTask = addTask;
  window.editTask = editTask;
  window.setView = setView;
  setView('kanban');
  loadDropdowns();
  loadTasks();
</script>
</body>
</html>
