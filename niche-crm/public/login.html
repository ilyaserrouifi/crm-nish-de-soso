<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Niche CRM Login</title><style>body{font-family:Arial;background:#0b0b0e;color:#eee;display:grid;place-items:center;min-height:100vh}.card{width:min(420px,92vw);background:#15151d;border:1px solid #2a2a36;padding:24px;border-radius:14px}.logo{width:90px;height:90px;object-fit:contain;margin:0 auto 12px;display:block}.row{display:grid;gap:8px;margin:12px 0}input,button{padding:11px;border-radius:10px;border:1px solid #333}button{background:#2b2fff;color:#fff;border:none;cursor:pointer}.meta{opacity:.8;font-size:13px}</style></head><body><div class='card'><img class='logo' src='/assets/imagsoso.png' onerror="this.style.display='none'"/><h2>Connexion CRM</h2><p class='meta'>Login + role redirect (admin/finance/pm/freelancer/client)</p><div class='row'><input id='email' placeholder='Email'/><input id='password' type='password' placeholder='Mot de passe'/><button onclick='login()'>Se connecter</button></div><p id='msg'></p></div><script>
async function login(){const email=document.getElementById('email').value;const password=document.getElementById('password').value;const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const d=await r.json();if(!r.ok){document.getElementById('msg').textContent=d.error||'Login failed';return;}localStorage.setItem('crm_user',JSON.stringify(d));const role=(d.role||'').toUpperCase();if(role==='ADMIN')location.href='/pages/index.html';else if(role==='FINANCE')location.href='/pages/finance.html';else if(role==='PROJECT_MANAGER')location.href='/pages/projects.html';else if(role==='CLIENT')location.href='/pages/clients.html';else location.href='/pages/tasks.html';}
</script></body></html>
